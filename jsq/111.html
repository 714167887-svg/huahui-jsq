  const doorIdx = (segCount >= 1 && segCount % 2 === 1) ? Math.floor(segCount / 2) : -1;
  // 转轴 / 拉手对侧：currentDirection 为转轴侧；拉手在另一侧
  const dirRaw = (window.__lastPayload && window.__lastPayload.currentDirection) || "left";
  const hingeOnLeft = dirRaw !== "right"; // "left"/"none" 默认转轴在左
  const handleOnLeft = !hingeOnLeft;

  // 逐段构建：每两个相邻点之间一片玻璃 + 全包边框
  for (let i = 0; i + 1 < pts3d.length; i++) {
    const a = pts3d[i];
    const b = pts3d[i + 1];
    const dx = b.x - a.x;
    const dz = b.z - a.z;
    const len = Math.sqrt(dx * dx + dz * dz);
    if (len < 1) continue;
    const angle = Math.atan2(dz, dx);
    const isDoor = (i === doorIdx);

    // 段中心局部坐标系
    const seg = new THREE.Group();
    seg.position.set((a.x + b.x) / 2, 0, (a.z + b.z) / 2);
    seg.rotation.y = -angle;
    three.wallsGroup.add(seg);

    // 计算缺口对该段轨道的影响（仅左/右端段、固玻段才会有缺口）
    const segLabelHere0 = segLabels[i] || '';
    const _outerSign0 = (i === 0) ? -1 : (i === pts3d.length - 2 ? +1 : 0);
    const _topN0 = (_outerSign0 !== 0) ? _notchOf(notches, segLabelHere0, 'top') : null;
    const _botN0 = (_outerSign0 !== 0) ? _notchOf(notches, segLabelHere0, 'bottom') : null;
    const topCutW = _topN0 ? Math.min(_topN0.w, len - 2) : 0;
    const botCutW = _botN0 ? Math.min(_botN0.w, len - 2) : 0;
    const topLen = len - topCutW;
    const topCX  = (_outerSign0 > 0 ? -topCutW / 2 : (_outerSign0 < 0 ? topCutW / 2 : 0));
    const botLen = len - botCutW;
    const botCX  = (_outerSign0 > 0 ? -botCutW / 2 : (_outerSign0 < 0 ? botCutW / 2 : 0));

    // —— 上下横档（弓） ——
    const top = new THREE.Mesh(
      new THREE.BoxGeometry(topLen, TOP_BAR_FACE, FRAME_D),
      frameMat
    );
    top.position.set(topCX, wallH - TOP_BAR_FACE / 2, 0);
    top.castShadow = true; top.receiveShadow = true;
    seg.add(top);

    const bot = new THREE.Mesh(
      new THREE.BoxGeometry(botLen, BOT_BAR_FACE, FRAME_D),
      frameMat
    );
    bot.position.set(botCX, BOT_BAR_FACE / 2, 0);
    bot.castShadow = true; bot.receiveShadow = true;
    seg.add(bot);

    // 玻璃尺寸：去除上下框 + 左右两侧立柱占位（用相邻点决定占位）
    const leftIsEnd  = (i === 0);
    const rightIsEnd = (i === pts3d.length - 2);
    const leftFace  = leftIsEnd  ? SIDE_END_FACE : MID_POST_HALF;
    const rightFace = rightIsEnd ? SIDE_END_FACE : MID_POST_HALF;
    const glassInsetTop = TOP_BAR_FACE;
    const glassInsetBot = BOT_BAR_FACE;
    const innerH = wallH - glassInsetTop - glassInsetBot;
    const glassW = len - leftFace - rightFace;
    const glassCX = (rightFace - leftFace) / 2; // 中心略偏移以贴合两端立柱
    const glassCY = glassInsetBot + innerH / 2;

    if (isDoor) {
      // —— 门扇：在外框内孔放置一个独立全包门扇 ——
      // 外框内孔
      const openW = glassW;
      const openH = innerH;
      // 门扇外缘（与外框留 DOOR_GAP）
      const dW = openW - DOOR_GAP * 2;
      const dH = openH - DOOR_GAP * 2;
      const dCX = glassCX;
      const dCY = glassCY;

      // 门扇 4 边：拉手侧 12 / 转轴侧 18 / 上下 12
      const leftFaceDoor  = handleOnLeft ? DOOR_HANDLE_SIDE : DOOR_HINGE_SIDE;
      const rightFaceDoor = handleOnLeft ? DOOR_HINGE_SIDE  : DOOR_HANDLE_SIDE;

      const dTop = new THREE.Mesh(new THREE.BoxGeometry(dW, DOOR_TB_FACE, DOOR_FD), frameMat);
      dTop.position.set(dCX, dCY + dH / 2 - DOOR_TB_FACE / 2, 0);
      seg.add(dTop);
      const dBot = new THREE.Mesh(new THREE.BoxGeometry(dW, DOOR_TB_FACE, DOOR_FD), frameMat);
      dBot.position.set(dCX, dCY - dH / 2 + DOOR_TB_FACE / 2, 0);
      seg.add(dBot);
      const dLef = new THREE.Mesh(new THREE.BoxGeometry(leftFaceDoor, dH - DOOR_TB_FACE * 2, DOOR_FD), frameMat);
      dLef.position.set(dCX - dW / 2 + leftFaceDoor / 2, dCY, 0);
      seg.add(dLef);
      const dRig = new THREE.Mesh(new THREE.BoxGeometry(rightFaceDoor, dH - DOOR_TB_FACE * 2, DOOR_FD), frameMat);
      dRig.position.set(dCX + dW / 2 - rightFaceDoor / 2, dCY, 0);
      seg.add(dRig);
      [dTop, dBot, dLef, dRig].forEach((m) => { m.castShadow = true; m.receiveShadow = true; });

      // 门扇玻璃
      const dGlassW = dW - leftFaceDoor - rightFaceDoor;
      const dGlassH = dH - DOOR_TB_FACE * 2;
      const dGlass = new THREE.Mesh(new THREE.BoxGeometry(dGlassW, dGlassH, wallT), glassMat);
      dGlass.position.set(dCX + (rightFaceDoor - leftFaceDoor) / 2, dCY, 0);
      dGlass.castShadow = true; dGlass.receiveShadow = true;
      seg.add(dGlass);
      const dEdges = new THREE.LineSegments(new THREE.EdgesGeometry(dGlass.geometry, 25), edgeMat);
      dEdges.position.copy(dGlass.position);
      seg.add(dEdges);

      // —— 1m 拉手：底端离地 100mm，安装在门扇靠开启侧 ——
      // 拉手 X：handleOnLeft → 在门扇左侧（=负 X 边）
      const handleSign = handleOnLeft ? -1 : 1;
      const handleEdgeX = dCX + handleSign * (dW / 2 - (handleOnLeft ? leftFaceDoor : rightFaceDoor));
      const handleX = handleEdgeX - handleSign * HANDLE_OFFSET_FROM_EDGE;
      const standoffZ = wallT / 2 + HANDLE_STAND_OFF / 2;
      const handleZ = wallT / 2 + HANDLE_STAND_OFF + HANDLE_DIA / 2;
      const handleCenterY = HANDLE_BOTTOM_FROM_GROUND + HANDLE_LEN / 2;

      const bar = new THREE.Mesh(
        new THREE.CylinderGeometry(HANDLE_DIA / 2, HANDLE_DIA / 2, HANDLE_LEN, 24),
        handleMat
      );
      bar.position.set(handleX, handleCenterY, handleZ);
      bar.castShadow = true;
      seg.add(bar);
      [-1, 1].forEach((s) => {
        const standoff = new THREE.Mesh(
          new THREE.CylinderGeometry(HANDLE_DIA / 2 + 4, HANDLE_DIA / 2 + 4, HANDLE_STAND_OFF, 20),
          handleMat
        );
        standoff.rotation.x = Math.PI / 2;
        standoff.position.set(handleX, handleCenterY + s * (HANDLE_LEN / 2 - 40), standoffZ);
        standoff.castShadow = true;
        seg.add(standoff);
      });
      // 端帽
      [-1, 1].forEach((s) => {
        const cap = new THREE.Mesh(
          new THREE.SphereGeometry(HANDLE_DIA / 2 + 1, 16, 12),
          handleMat
        );
        cap.position.set(handleX, handleCenterY + s * (HANDLE_LEN / 2), handleZ);
        cap.castShadow = true;
        seg.add(cap);
      });
    } else {
      // 固定扇：玻璃完整充满外框内孔（支持外侧上下角缺口）
      const segLabelHere = segLabels[i] || '';
      const outerSign = leftIsEnd ? -1 : (rightIsEnd ? +1 : 0);
      const usableNotches = (outerSign !== 0) ? _notchList(notches, segLabelHere) : [];
      const panelGeo = buildPanelGeometry(glassW, innerH, wallT, usableNotches, outerSign);
      const panel = new THREE.Mesh(panelGeo, glassMat);
      panel.position.set(glassCX, glassCY, 0);
      panel.castShadow = true; panel.receiveShadow = true;
      panel.userData = {
        isFixedPanel: true,
        segLabel: segLabelHere,
        glassW, innerH, glassCX, glassCY, outerSign,
      };
      seg.add(panel);
      // 边线：用真实多边形轮廓
      const outline = buildPanelOutline(glassW, innerH, wallT, usableNotches, outerSign);
      outline.position.copy(panel.position);
      seg.add(outline);
    }
  }

  // 各折点处的金属立柱：端柱方形截面 + 缺口折弯；中柱圆柱（与上下轨同高）
  for (let i = 0; i < pts3d.length; i++) {
    const p = pts3d[i];
    const isEnd = (i === 0 || i === pts3d.length - 1);
    if (isEnd) {
      const side = SIDE_END_FACE * 2;
      const neighbor = (i === 0) ? pts3d[1] : pts3d[pts3d.length - 2];
      const ang = Math.atan2(neighbor.z - p.z, neighbor.x - p.x);

      // 检查相邻段是否有缺口（端立柱跟着缺口同侧也截短）
      const segIdx = (i === 0) ? 0 : (pts3d.length - 2);
      const segLab = segLabels[segIdx] || '';
      const _topN = _notchOf(notches, segLab, 'top');
      const _botN = _notchOf(notches, segLab, 'bottom');
      const topCut = _topN ? Math.min(_topN.h, wallH - 1) : 0;
      const botCut = _botN ? Math.min(_botN.h, wallH - 1) : 0;
      const totalH2 = wallH + 2;

      // 立柱主干
      const trunkH = totalH2 - topCut - botCut;
      if (trunkH > 0.5) {
        const trunk = new THREE.Mesh(
          new THREE.BoxGeometry(side, trunkH, FRAME_D),
          frameMat
        );
        trunk.rotation.y = -ang;
        trunk.position.set(p.x, botCut + trunkH / 2, p.z);
        trunk.castShadow = true; trunk.receiveShadow = true;
        three.wallsGroup.add(trunk);
      }

      // 沿墙向内方向单位向量
      const inwardX = Math.cos(ang), inwardZ = Math.sin(ang);

      // 缺口"折弯" ⌈/⌊：垂直短段 + 水平挡板
      const drawElbow = (n, isTop) => {
        if (!n) return;
        const cutH = isTop ? topCut : botCut;
        if (cutH <= 0) return;
        const cx1 = p.x + n.w * inwardX;
        const cz1 = p.z + n.w * inwardZ;
        const closer = new THREE.Mesh(
          new THREE.BoxGeometry(side, cutH, FRAME_D),
          frameMat
        );
        closer.rotation.y = -ang;
        const cy1 = isTop ? (wallH - cutH / 2) : (cutH / 2);
        closer.position.set(cx1, cy1, cz1);
        closer.castShadow = true; closer.receiveShadow = true;
        three.wallsGroup.add(closer);
        const capLen = n.w + side / 2;
        const cx2 = p.x + (capLen / 2) * inwardX;
        const cz2 = p.z + (capLen / 2) * inwardZ;
        const cap = new THREE.Mesh(
          new THREE.BoxGeometry(capLen, side, FRAME_D),
          frameMat
        );
        cap.rotation.y = -ang;
        const cy2 = isTop ? (wallH - cutH - side / 2) : (cutH + side / 2);
        cap.position.set(cx2, cy2, cz2);
        cap.castShadow = true; cap.receiveShadow = true;
        three.wallsGroup.add(cap);
      };
      drawElbow(_topN, true);
      drawElbow(_botN, false);
    } else {
      // 中柱：圆柱（与上下轨同宽，与轨道直接重叠）
      const post = new THREE.Mesh(
        new THREE.CylinderGeometry(FRAME_D / 2, FRAME_D / 2, wallH, 64, 1),
        frameMat
      );
      post.position.set(p.x, wallH / 2, p.z);
      post.castShadow = true;
      post.receiveShadow = true;
      three.wallsGroup.add(post);

      // 顶/底端盖
      const capGeo = new THREE.CylinderGeometry(FRAME_D / 2 + 0.6, FRAME_D / 2, 3, 64);
      const capTop = new THREE.Mesh(capGeo, frameMat);
      capTop.position.set(p.x, wallH - 1.5, p.z);
      capTop.castShadow = true; capTop.receiveShadow = true;
      three.wallsGroup.add(capTop);
      const capBot = new THREE.Mesh(capGeo.clone(), frameMat);
      capBot.rotation.x = Math.PI;
      capBot.position.set(p.x, 1.5, p.z);
      capBot.castShadow = true; capBot.receiveShadow = true;
      three.wallsGroup.add(capBot);
    }
  }

  // 控制器目标对准结构中心
  // 自适应相机距离：基于真实毫米尺寸
  const xs3 = pts3d.map((p) => p.x), zs3 = pts3d.map((p) => p.z);
  const footprintMM = Math.max(
    Math.max(...xs3) - Math.min(...xs3),
    Math.max(...zs3) - Math.min(...zs3)
  ) || 2000;
  const camDist = Math.max(2200, 1.7 * Math.max(footprintMM, wallH));

  // 仅在首次构建或显式 force 时重置相机；之后保留用户旋转/缩放结果
  const isFirstBuild = !three.cameraInitialized;
  if (isFirstBuild || opts.forceCamera) {
    three.controls.target.set(0, wallH * 0.45, 0);
    const cur = three.camera.position;
    const dir = new THREE.Vector3(cur.x, cur.y, cur.z).sub(three.controls.target);
    if (dir.length() < 1) dir.set(0, 0.36, 1);
    dir.setLength(camDist);
    three.camera.position.copy(three.controls.target.clone().add(dir));
    three.cameraInitialized = true;
  }
}

function moveCaptureToolbarToActiveHost() {
  const toolbar = document.getElementById("capture-toolbar");
  const staging = document.getElementById("capture-toolbar-staging");
  if (!toolbar) return;
  const host = document.getElementById("capture-host-stage");
  if (host) host.appendChild(toolbar);
  else if (staging) staging.appendChild(toolbar);
}

/* ============================================================
   高级 SVG 交互：方向标签拖拽 + 右键菜单 + 插入字段（持久化 + 拖拽 + 删除）
   ============================================================ */
const LONG_PRESS_MS = 350;
const MOVE_TOL = 8;
const FIELDS_LS_KEY = "huahui:insertedFields:v1";
const DIR_OFFSET_LS_KEY = "huahui:dirLabelOffset:v1";
const FORCED_LS_KEY = "huahui:forcedDims:v1";

let directionLabelOffset = loadDirOffset();
let insertedFields = loadFields();
let nextFieldId = insertedFields.reduce((m, f) => Math.max(m, f.id || 0), 0) + 1;
let selectedFieldId = null;
let forcedDims = loadForced(); // { base: { diamond: {l,c,r,...} }, angle: { diamond: {"angle-l","angle-r"} } }

let dragState = null; // { kind, pointerId, startSvg, startOffset, startRatio, target }

function loadDirOffset() {
  try { return JSON.parse(localStorage.getItem(DIR_OFFSET_LS_KEY)) || { dx: 0, dy: 0 }; }
  catch { return { dx: 0, dy: 0 }; }
}
function saveDirOffset() {
  try { localStorage.setItem(DIR_OFFSET_LS_KEY, JSON.stringify(directionLabelOffset)); } catch {}
}
function loadFields() {
  try { const v = JSON.parse(localStorage.getItem(FIELDS_LS_KEY)); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
function saveFields() {
  try { localStorage.setItem(FIELDS_LS_KEY, JSON.stringify(insertedFields)); } catch {}
}
function loadForced() {
  try { return JSON.parse(localStorage.getItem(FORCED_LS_KEY)) || { base: {}, angle: {} }; }
  catch { return { base: {}, angle: {} }; }
}
function saveForced() {
  try { localStorage.setItem(FORCED_LS_KEY, JSON.stringify(forcedDims)); } catch {}
}
function setForcedValue(scope, roomType, segment, value) {
  forcedDims[scope] = forcedDims[scope] || {};
  forcedDims[scope][roomType] = forcedDims[scope][roomType] || {};
  if (value == null || !Number.isFinite(value)) {
    delete forcedDims[scope][roomType][segment];
  } else {
    forcedDims[scope][roomType][segment] = value;
  }
  saveForced();
}
function clearAllForced() {
  forcedDims = { base: {}, angle: {} };
  saveForced();
}

function getSvgPoint(svg, clientX, clientY) {
  const pt = svg.createSVGPoint();
  pt.x = clientX; pt.y = clientY;
  const ctm = svg.getScreenCTM();
  if (!ctm) return { x: 0, y: 0 };
  const inv = ctm.inverse();
  const out = pt.matrixTransform(inv);
  return { x: out.x, y: out.y };
}
function getSvgViewBox(svg) {
  const vb = svg.viewBox && svg.viewBox.baseVal;
  if (vb && vb.width > 0 && vb.height > 0) {
    return { x: vb.x, y: vb.y, w: vb.width, h: vb.height };
  }
  return { x: 0, y: 0, w: 500, h: 280 };
}

function applyDirectionLabelOffset() {
  const svg = $("#main-svg");
  const lab = svg.querySelector("#direction-label");
  if (!lab) return;
  const bx = parseFloat(lab.getAttribute("data-base-x"));
  const by = parseFloat(lab.getAttribute("data-base-y"));
  if (!Number.isFinite(bx) || !Number.isFinite(by)) return;
  lab.setAttribute("x", bx + (directionLabelOffset.dx || 0));
  lab.setAttribute("y", by + (directionLabelOffset.dy || 0));
}

function renderCustomFields() {
  const svg = $("#main-svg");
  let layer = svg.querySelector("g.custom-field-layer");
  if (layer) layer.remove();
  if (!insertedFields.length) return;
  layer = document.createElementNS("http://www.w3.org/2000/svg", "g");
  layer.setAttribute("class", "custom-field-layer");
  const vb = getSvgViewBox(svg);
  insertedFields.forEach((f) => {
    const t = document.createElementNS("http://www.w3.org/2000/svg", "text");
    t.setAttribute("class", "svg-custom-field" + (f.id === selectedFieldId ? " is-selected" : ""));
    t.setAttribute("data-field-id", String(f.id));
    t.setAttribute("x", String(vb.x + (f.xRatio || 0) * vb.w));
    t.setAttribute("y", String(vb.y + (f.yRatio || 0) * vb.h));
    t.textContent = f.label || "";
    layer.appendChild(t);
  });
  svg.appendChild(layer);
}

function setSelectedField(id) {
  selectedFieldId = id;
  $("#main-svg").querySelectorAll("text.svg-custom-field").forEach((el) => {
    el.classList.toggle("is-selected", parseInt(el.dataset.fieldId, 10) === id);
  });
}

function setupAdvancedSvgInteractions() {
  const svg = $("#main-svg");
  if (!svg) return;

  svg.addEventListener("pointerdown", onSvgPointerDown);
  document.addEventListener("pointermove", onDocPointerMove);
  document.addEventListener("pointerup", onDocPointerUp);
  document.addEventListener("pointercancel", onDocPointerUp);

  // 右键菜单
  svg.addEventListener("contextmenu", onSvgContextMenu);
  document.addEventListener("pointerdown", (e) => {
    const menu = $("#force-edit-menu");
    if (!menu.hidden && !menu.contains(e.target)) hideMenu();
  }, true);
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape") { hideMenu(); }
    if ((e.key === "Delete" || e.key === "Backspace") &&
        selectedFieldId != null &&
        !(e.target.matches && e.target.matches("input, textarea, [contenteditable]"))) {
      e.preventDefault();
      deleteField(selectedFieldId);
    }
  });
  window.addEventListener("blur", hideMenu);
  window.addEventListener("resize", hideMenu);
  document.addEventListener("scroll", hideMenu, true);
}

function onSvgPointerDown(e) {
  if (e.button !== 0) return;
  const svg = e.currentTarget;
  const target = e.target;
  // 取消选中（点空白）
  if (!target.closest("text.svg-custom-field")) {
    setSelectedField(null);
  }
  // 自定义字段长按拖拽
  const customEl = target.closest("text.svg-custom-field");
  if (customEl) {
    const id = parseInt(customEl.dataset.fieldId, 10);
    setSelectedField(id);
    const f = insertedFields.find((x) => x.id === id);
    if (!f) return;
    startLongPressDrag({
      kind: "field",
      pointerId: e.pointerId,
      target: customEl,
      startClient: { x: e.clientX, y: e.clientY },
      startSvg: getSvgPoint(svg, e.clientX, e.clientY),
      startRatio: { x: f.xRatio, y: f.yRatio },
      fieldId: id,
    });
    return;
  }
  // 方向标签长按拖拽
  const dirEl = target.closest("text.svg-direction-label, #direction-label");
  if (dirEl) {
    startLongPressDrag({
      kind: "dir",
      pointerId: e.pointerId,
      target: dirEl,
      startClient: { x: e.clientX, y: e.clientY },
      startSvg: getSvgPoint(svg, e.clientX, e.clientY),
      startOffset: { ...directionLabelOffset },
    });
    return;
  }
}

function startLongPressDrag(spec) {
  cancelLongPress();
  dragState = { ...spec, dragging: false, longPressTimer: null };
  dragState.longPressTimer = setTimeout(() => {
    if (!dragState) return;
    dragState.dragging = true;
    if (spec.target && spec.target.classList) spec.target.classList.add("is-dragging");
    try { spec.target.setPointerCapture && spec.target.setPointerCapture(spec.pointerId); } catch {}
  }, LONG_PRESS_MS);
}
function cancelLongPress() {
  if (dragState && dragState.longPressTimer) clearTimeout(dragState.longPressTimer);
}

function onDocPointerMove(e) {
  if (!dragState || dragState.pointerId !== e.pointerId) return;
  const dx = e.clientX - dragState.startClient.x;
  const dy = e.clientY - dragState.startClient.y;
  if (!dragState.dragging) {
    if (Math.hypot(dx, dy) > MOVE_TOL) {
      // 移动太大，取消长按
      cancelLongPress();
      dragState = null;
    }
    return;
  }
  const svg = $("#main-svg");
  const cur = getSvgPoint(svg, e.clientX, e.clientY);
  if (dragState.kind === "dir") {
    directionLabelOffset = {
      dx: (dragState.startOffset.dx || 0) + (cur.x - dragState.startSvg.x),
      dy: (dragState.startOffset.dy || 0) + (cur.y - dragState.startSvg.y),
    };
    applyDirectionLabelOffset();
  } else if (dragState.kind === "field") {
    const vb = getSvgViewBox(svg);
    const f = insertedFields.find((x) => x.id === dragState.fieldId);
    if (!f) return;
    f.xRatio = dragState.startRatio.x + (cur.x - dragState.startSvg.x) / vb.w;
    f.yRatio = dragState.startRatio.y + (cur.y - dragState.startSvg.y) / vb.h;
    f.xRatio = Math.max(0, Math.min(1, f.xRatio));
    f.yRatio = Math.max(0, Math.min(1, f.yRatio));
    const el = dragState.target;
    el.setAttribute("x", String(vb.x + f.xRatio * vb.w));
    el.setAttribute("y", String(vb.y + f.yRatio * vb.h));
  }
}

function onDocPointerUp(e) {
  if (!dragState || dragState.pointerId !== e.pointerId) return;
  cancelLongPress();
  if (dragState.dragging) {
    if (dragState.target && dragState.target.classList) dragState.target.classList.remove("is-dragging");
    if (dragState.kind === "dir") saveDirOffset();
    if (dragState.kind === "field") saveFields();
  }
  dragState = null;
}

/* ---------- 右键菜单 ---------- */
function onSvgContextMenu(e) {
  e.preventDefault();
  const svg = e.currentTarget;
  const items = [];
  const forceEl = e.target.closest && e.target.closest("[data-force-editable='true']");
  const customEl = e.target.closest && e.target.closest("text.svg-custom-field");
  if (forceEl) {
    const scope   = forceEl.getAttribute("data-force-scope") || "base";
    const type    = forceEl.getAttribute("data-force-type") || "diamond";
    const segment = forceEl.getAttribute("data-force-segment") || "";
    const rawVal  = forceEl.getAttribute("data-force-value") || "";
    const active  = forceEl.getAttribute("data-force-active") === "true";
    const unit    = scope === "angle" ? "°" : "mm";
    items.push({
      label: active ? `修改强制值（当前 ${rawVal}${unit}）` : `强制修改原值（${rawVal}${unit}）`,
      action: () => openForceEditPrompt(scope, type, segment, rawVal, unit),
    });
    if (active) {
      items.push({
        label: "重置该值",
        danger: true,
        action: () => { setForcedValue(scope, type, segment, null); scheduleDraw(); },
      });
    }
    const hasAnyForced =
      Object.keys(forcedDims.base || {}).some((k) => Object.keys(forcedDims.base[k] || {}).length) ||
      Object.keys(forcedDims.angle || {}).some((k) => Object.keys(forcedDims.angle[k] || {}).length);
    if (hasAnyForced) {
      items.push({
        label: "清空所有强制值",
        danger: true,
        action: () => { clearAllForced(); scheduleDraw(); },
      });
    }
  } else if (customEl) {
    const id = parseInt(customEl.dataset.fieldId, 10);
    setSelectedField(id);
    items.push({ label: "编辑文本", action: () => editField(id) });
    items.push({ label: "删除字段", danger: true, action: () => deleteField(id) });
  } else {
    const sp = getSvgPoint(svg, e.clientX, e.clientY);
    const vb = getSvgViewBox(svg);
    const xRatio = (sp.x - vb.x) / vb.w;
    const yRatio = (sp.y - vb.y) / vb.h;
    items.push({ label: "插入字段", action: () => insertFieldAt(xRatio, yRatio) });
    items.push({ label: "重置方向标签", action: () => {
      directionLabelOffset = { dx: 0, dy: 0 };
      saveDirOffset();
      applyDirectionLabelOffset();
    }});
    if (insertedFields.length) {
      items.push({ label: "清空所有自定义字段", danger: true, action: () => {
        insertedFields = []; selectedFieldId = null; saveFields(); renderCustomFields();
      }});
    }
  }
  showMenu(e.clientX, e.clientY, items);
}

function openForceEditPrompt(scope, type, segment, currentValue, unit) {
  const promptMsg = scope === "angle"
    ? `请输入新角度（${unit}），留空或输入 0 取消强制：`
    : `请输入新长度（${unit}），留空取消强制：`;
  const input = window.prompt(promptMsg, currentValue || "");
  if (input === null) return;
  const trimmed = String(input).trim();
  if (trimmed === "") {
    setForcedValue(scope, type, segment, null);
    scheduleDraw();
    return;
  }
  const num = parseFloat(trimmed);
  if (!Number.isFinite(num)) {
    alert("请输入有效数字");
    return;
  }
  setForcedValue(scope, type, segment, num);
  scheduleDraw();
}

function showMenu(clientX, clientY, items) {
  const menu = $("#force-edit-menu");
  menu.innerHTML = "";
  items.forEach((it) => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "force-edit-menu__item" + (it.danger ? " force-edit-menu__item--danger" : "");
    btn.textContent = it.label;
    btn.addEventListener("click", () => { hideMenu(); it.action(); });
    menu.appendChild(btn);
  });
  menu.hidden = false;
  // 边界修正
  menu.style.left = "0px"; menu.style.top = "0px";
  const rect = menu.getBoundingClientRect();
  const x = Math.min(clientX, window.innerWidth - rect.width - 8);
  const y = Math.min(clientY, window.innerHeight - rect.height - 8);
  menu.style.left = Math.max(8, x) + "px";
  menu.style.top  = Math.max(8, y) + "px";
}
function hideMenu() {
  const menu = $("#force-edit-menu");
  if (menu) menu.hidden = true;
}

function insertFieldAt(xRatio, yRatio) {
  const label = window.prompt("插入字段文本：", "备注");
  if (!label) return;
  const id = nextFieldId++;
  insertedFields.push({ id, label: label.trim(), xRatio, yRatio });
  saveFields();
  selectedFieldId = id;
  renderCustomFields();
}
function editField(id) {
  const f = insertedFields.find((x) => x.id === id);
  if (!f) return;
  const v = window.prompt("修改字段文本：", f.label || "");
  if (v == null) return;
  f.label = v.trim();
  saveFields();
  renderCustomFields();
}
function deleteField(id) {
  insertedFields = insertedFields.filter((x) => x.id !== id);
  if (selectedFieldId === id) selectedFieldId = null;
  saveFields();
  renderCustomFields();
}

/* ============================================================
   截图 / 编辑（捕获 SVG 或 3D Canvas → PNG）
   ============================================================ */
function setupCaptureButtons() {
  const capBtn = document.getElementById("capture-btn");
  const editBtn = document.getElementById("capture-edit-btn");
  if (capBtn) capBtn.addEventListener("click", () => {
    exportSnapshot().catch((err) => setCapStatus(err.message || "截图失败", true));
  });
  if (editBtn) editBtn.addEventListener("click", () => {
    openSnapshotEditor().catch((err) => setCapStatus(err.message || "无法打开编辑器", true));
  });
  const sigInput = document.getElementById("capture-signature");
  if (sigInput) {
    try { sigInput.value = localStorage.getItem("huahui:signature:v1") || ""; } catch {}
    sigInput.addEventListener("input", () => {
      try { localStorage.setItem("huahui:signature:v1", sigInput.value); } catch {}
    });
  }
}

function setCapStatus(msg, isError) {
  const el = document.getElementById("capture-status");
  if (!el) return;
  el.textContent = msg || "";
  el.classList.toggle("error", !!isError);
  el.classList.toggle("success", !!msg && !isError);
}

function buildSnapshotBlob() {
  const stage = document.getElementById("diagram-stage");
  const view = stage && stage.dataset.view === "3d" ? "3d" : "2d";
  const left = view === "3d" ? snapshot3DBlob() : snapshotSvgBlob();
  return left.then((blob) => composeSnapshotWithReference(blob));
}

function snapshotSvgBlob() {
  return new Promise((resolve, reject) => {
    const svg = document.getElementById("main-svg");
    if (!svg) return reject(new Error("矢量图不存在"));
    if (!svg.querySelector("path, line, polyline, polygon, circle, rect")) {
      return reject(new Error("请先生成有效矢量图"));
    }
    const vb = svg.viewBox && svg.viewBox.baseVal;
    let minX = 0, minY = 0, vbW = 0, vbH = 0;
    if (vb && vb.width > 0 && vb.height > 0) {
      minX = vb.x; minY = vb.y; vbW = vb.width; vbH = vb.height;
    } else {
      const bb = svg.getBoundingClientRect();
      vbW = Math.max(bb.width, 200); vbH = Math.max(bb.height, 200);
    }
    const PAD = 20;
    const exMinX = minX - PAD, exMinY = minY - PAD;
    const exW = vbW + PAD * 2, exH = vbH + PAD * 2;
    const SVG_NS = "http://www.w3.org/2000/svg";

    // 构造干净的导出 SVG（白底 + 克隆的内容 + 签名）
    const exSvg = document.createElementNS(SVG_NS, "svg");
    exSvg.setAttribute("xmlns", SVG_NS);
    exSvg.setAttribute("xmlns:xlink", "http://www.w3.org/1999/xlink");
    exSvg.setAttribute("viewBox", `${exMinX} ${exMinY} ${exW} ${exH}`);
    const SCALE = 4;
    const outW = Math.round(exW * SCALE);
    const outH = Math.round(exH * SCALE);
    exSvg.setAttribute("width", outW);
    exSvg.setAttribute("height", outH);

    const bg = document.createElementNS(SVG_NS, "rect");
    bg.setAttribute("x", exMinX);
    bg.setAttribute("y", exMinY);
    bg.setAttribute("width", exW);
    bg.setAttribute("height", exH);
    bg.setAttribute("fill", "#ffffff");
    exSvg.appendChild(bg);

    // 注入 SVG 必需样式（具体颜色，避免 var() 在 data-URL 失效导致的黑色填充）
    const cs = getComputedStyle(document.documentElement);
    const wallC  = (cs.getPropertyValue("--wall-color")  || "#1c1714").trim();
    const guideC = (cs.getPropertyValue("--guide-color") || "#d61f1f").trim();
    const angleC = (cs.getPropertyValue("--angle-color") || "#9a6b3e").trim();
    const labelC = (cs.getPropertyValue("--label-color") || "#1c1714").trim();
    const gtxtC  = (cs.getPropertyValue("--guide-text-color") || guideC).trim();
    const styleEl = document.createElementNS(SVG_NS, "style");
    styleEl.textContent = `
      .svg-wall { stroke: ${wallC}; stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .svg-guide { stroke: ${guideC}; stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 2; opacity: .95; }
      .svg-angle-arc { fill: none; stroke: ${angleC}; stroke-width: 2; }
      .svg-text, .svg-guide-text, .svg-angle-text {
        font-weight: 800; font-family: 'Inter','Microsoft YaHei UI',sans-serif;
        text-anchor: middle; dominant-baseline: middle;
        paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px;
      }
      .svg-text { fill: ${labelC}; font-size: 17px; }
      .svg-guide-text { fill: ${gtxtC}; font-size: 17px; }
      .svg-angle-text { fill: ${angleC}; font-size: 18px; }
      .svg-direction-label {
        fill: ${guideC}; font-weight: 800; font-size: 22px;
        font-family: 'Inter','Microsoft YaHei UI',sans-serif;
        paint-order: stroke; stroke: #ffffff; stroke-width: 4px;
      }
      .svg-custom-field {
        fill: ${labelC}; font-size: 18px; font-weight: 800;
        font-family: 'Microsoft YaHei UI', sans-serif;
        paint-order: stroke; stroke: #ffffff; stroke-width: 4px;
      }
      .svg-custom-field.is-selected { fill: ${guideC}; }
    `;
    exSvg.appendChild(styleEl);

    Array.from(svg.childNodes).forEach((node) => {
      // 跳过占位文字（"请输入数据生成示意图"）
      if (node.nodeType === 1 && node.tagName === "text" && /请输入数据/.test(node.textContent || "")) return;
      exSvg.appendChild(node.cloneNode(true));
    });

    const sig = (document.getElementById("capture-signature") || {}).value || "";
    const stamp = (sig ? `制图：${sig} · ` : "") + new Date().toLocaleDateString();
    const t = document.createElementNS(SVG_NS, "text");
    t.setAttribute("x", exMinX + exW - 8);
    t.setAttribute("y", exMinY + exH - 8);
    t.setAttribute("text-anchor", "end");
    t.setAttribute("fill", "#94a3b8");
    t.setAttribute("font-size", Math.max(10, Math.round(Math.min(exW, exH) * 0.018)));
    t.setAttribute("font-family", "'Microsoft YaHei UI', sans-serif");
    t.textContent = stamp;
    exSvg.appendChild(t);

    const xml = new XMLSerializer().serializeToString(exSvg);
    const svg64 = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(xml);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement("canvas");
      canvas.width = outW; canvas.height = outH;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, outW, outH);
      ctx.drawImage(img, 0, 0, outW, outH);
      canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("PNG 转换失败")), "image/png");
    };
    img.onerror = () => reject(new Error("矢量图渲染失败"));
    img.src = svg64;
  });
}

/* —— 把主截图和右侧客户参考图拼成一张大图 —— */
function loadImageElement(src) {
  return new Promise((resolve, reject) => {
    const im = new Image();
    im.onload = () => resolve(im);
    im.onerror = () => reject(new Error("图片加载失败"));
    im.src = src;
  });
}

function composeSnapshotWithReference(leftBlob) {
  const preview = document.getElementById("reference-preview");
  if (!preview || preview.hidden || !preview.src) return Promise.resolve(leftBlob);
  const leftUrl = URL.createObjectURL(leftBlob);
  return Promise.all([loadImageElement(leftUrl), loadImageElement(preview.src)])
    .then(([leftImage, refImage]) => {
      const outH = leftImage.naturalHeight || 1080;
      const outW = leftImage.naturalWidth || 1440;
      const refAspect = refImage.naturalHeight ? (refImage.naturalWidth / refImage.naturalHeight) : 1;
      const panelMin = Math.max(Math.round(outH * 0.22), 220);
      const panelMax = Math.max(panelMin, Math.round(outW * 0.58));
      const panelNatural = Math.round(outH * refAspect);
      const refPanelW = Math.max(panelMin, Math.min(panelNatural, panelMax));
      const leftPanelW = Math.max(outW, refPanelW);
      const panelW = leftPanelW;
      const canvas = document.createElement("canvas");
      canvas.width = leftPanelW + panelW;
      canvas.height = outH;
      const ctx = canvas.getContext("2d");
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = "high";
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      const vectorX = Math.round((leftPanelW - outW) / 2);
      ctx.drawImage(leftImage, vectorX, 0, outW, outH);
      // 分隔线
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = Math.max(1, Math.round(outH * 0.0015));
      ctx.beginPath();
      ctx.moveTo(leftPanelW, 0);
      ctx.lineTo(leftPanelW, outH);
      ctx.stroke();
      // 参考图
      const pad = Math.max(Math.round(outH * 0.024), 20);
      const availW = Math.max(panelW - pad * 2, 1);
      const availH = Math.max(outH - pad * 2, 1);
      const sc = Math.min(
        availW / Math.max(refImage.naturalWidth || 1, 1),
        availH / Math.max(refImage.naturalHeight || 1, 1)
      );
      const dW = Math.max(1, Math.round((refImage.naturalWidth || availW) * sc));
      const dH = Math.max(1, Math.round((refImage.naturalHeight || availH) * sc));
      const dX = leftPanelW + Math.round((panelW - dW) / 2);
      const dY = Math.round((outH - dH) / 2);
      ctx.drawImage(refImage, dX, dY, dW, dH);
      return new Promise((res, rej) => {
        canvas.toBlob((b) => b ? res(b) : rej(new Error("PNG 转换失败")), "image/png");
      });
    })
    .finally(() => URL.revokeObjectURL(leftUrl));
}

function snapshot3DBlob() {
  return new Promise((resolve, reject) => {
    const canvas = document.getElementById("three-canvas");
    if (!canvas || !three.renderer || !three.camera || !three.wallsGroup) return reject(new Error("3D 画布不存在"));
    const renderer = three.renderer;
    const camera = three.camera;
    const scene = three.scene;
    const controls = three.controls;

    // 1) 模型世界包围盒
    const box = new THREE.Box3().setFromObject(three.wallsGroup);
    if (!isFinite(box.min.x) || box.isEmpty()) return reject(new Error("场景中暂无玻璃墙体"));

    // 2) 备份相机/控件/渲染器状态
    const oldPos = camera.position.clone();
    const oldTgt = controls ? controls.target.clone() : new THREE.Vector3();
    const oldAspect = camera.aspect;
    const oldPR = renderer.getPixelRatio();
    const oldSize = new THREE.Vector2(); renderer.getSize(oldSize);

    // 3) 输出画面：保留当前观察方向，按 bbox 估算合适宽高比
    const center = new THREE.Vector3(); box.getCenter(center);
    const size = new THREE.Vector3(); box.getSize(size);
    const dirVec = new THREE.Vector3().subVectors(oldPos, oldTgt).normalize();
    const planar = Math.max(size.x, size.z);
    const upH = Math.max(size.y, 1);
    const TARGET_W = 1920;
    const aspect = Math.max(0.6, Math.min(2.4, planar > 0 ? planar / upH : 1.6));
    const W = TARGET_W;
    const H = Math.round(TARGET_W / aspect);

    // 4) 切换相机 aspect + 重新计算适配距离
    camera.aspect = W / H;
    camera.updateProjectionMatrix();
    const halfFovV = THREE.MathUtils.degToRad(camera.fov) / 2;
    const halfFovH = Math.atan(Math.tan(halfFovV) * camera.aspect);
    const distV = (upH / 2) / Math.tan(halfFovV);
    const distH = (planar / 2) / Math.tan(halfFovH);
    const distance = Math.max(distV, distH) * 1.22;
    camera.position.copy(center).add(dirVec.multiplyScalar(distance));
    camera.lookAt(center);
    if (controls) { controls.target.copy(center); controls.update(); }

    // 5) 高清渲染（pixelRatio=2）
    const PR = 2;
    renderer.setPixelRatio(PR);
    renderer.setSize(W, H, false);

    let outErr = null;
    try {
      renderer.render(scene, camera);
      const out = document.createElement("canvas");
      out.width = W * PR; out.height = H * PR;
      const ctx = out.getContext("2d");
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, out.width, out.height);
      ctx.drawImage(canvas, 0, 0, out.width, out.height);
      drawSnapshotLabels(ctx, camera, out.width, out.height, PR);
      const sig = (document.getElementById("capture-signature") || {}).value || "";
      ctx.font = `${14 * PR}px 'Microsoft YaHei UI', sans-serif`;
      ctx.fillStyle = "#94a3b8";
      ctx.textAlign = "right";
      ctx.textBaseline = "alphabetic";
      const stamp = (sig ? `制图：${sig} · ` : "") + new Date().toLocaleDateString();
      ctx.fillText(stamp, out.width - 12 * PR, out.height - 10 * PR);

      out.toBlob((blob) => blob ? resolve(blob) : reject(new Error("PNG 转换失败")), "image/png");
    } catch (e) { outErr = e; }

    // 6) 恢复
    camera.aspect = oldAspect;
    camera.position.copy(oldPos);
    if (controls) { controls.target.copy(oldTgt); controls.update(); }
    camera.updateProjectionMatrix();
    renderer.setPixelRatio(oldPR);
    renderer.setSize(oldSize.x, oldSize.y, false);
    try { renderer.render(scene, camera); } catch {}

    if (outErr) reject(outErr);
  });
}

function drawSnapshotLabels(ctx, camera, W, H, PR) {
  if (!three.segData || !three.segData.length) return;
  // 字号自适应：取输出画布宽度的 ~2.6%，最低 36px
  const fontPx = Math.max(36, Math.round(W * 0.026));
  ctx.font = `800 ${fontPx}px 'Bahnschrift SemiCondensed','Microsoft YaHei UI',sans-serif`;
  ctx.textAlign = "center";
  ctx.textBaseline = "alphabetic";
  for (const seg of three.segData) {
    if (!(seg.mm > 0)) continue;
    const ndc = seg.mid.clone().project(camera);
    if (ndc.z > 1 || ndc.z < -1) continue;
    const sx = (ndc.x * 0.5 + 0.5) * W;
    const sy = (1 - (ndc.y * 0.5 + 0.5)) * H;
    const text = `材料 ${Math.round(seg.mm)} mm`;
    const ty = Math.max(fontPx + 8, sy - 12);
    // 白描边 + 黑填充
    ctx.lineWidth = Math.max(4, fontPx * 0.18);
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineJoin = "round";
    ctx.strokeText(text, sx, ty);
    ctx.fillStyle = "#0f172a";
    ctx.fillText(text, sx, ty);
  }
}

function findOpaqueBBox(img) {
  const { data, width: W, height: H } = img;
  let minX = W, minY = H, maxX = -1, maxY = -1;
  for (let y = 0; y < H; y++) {
    for (let x = 0; x < W; x++) {
      if (data[(y * W + x) * 4 + 3] > 8) {
        if (x < minX) minX = x;
        if (y < minY) minY = y;
        if (x > maxX) maxX = x;
        if (y > maxY) maxY = y;
      }
    }
  }
  if (maxX < 0) return null;
  return { x: minX, y: minY, w: maxX - minX + 1, h: maxY - minY + 1 };
}

function updateThreeLabels() {
  const host = document.getElementById("three-labels");
  const canvas = document.getElementById("three-canvas");
  if (!host || !canvas || !three.active) return;
  if (!three.segData || !three.segData.length) { host.innerHTML = ""; return; }
  const rect = canvas.getBoundingClientRect();
  const stage = canvas.parentElement;
  const stageRect = stage ? stage.getBoundingClientRect() : rect;
  while (host.children.length < three.segData.length) {
    const d = document.createElement("div");
    d.className = "three-label";
    host.appendChild(d);
  }
  while (host.children.length > three.segData.length) host.removeChild(host.lastChild);
  for (let i = 0; i < three.segData.length; i++) {
    const seg = three.segData[i];
    const div = host.children[i];
    if (!(seg.mm > 0)) { div.style.display = "none"; continue; }
    const ndc = seg.mid.clone().project(three.camera);
    if (ndc.z > 1 || ndc.z < -1) { div.style.display = "none"; continue; }
    const sx = (ndc.x * 0.5 + 0.5) * rect.width + (rect.left - stageRect.left);
    const sy = (1 - (ndc.y * 0.5 + 0.5)) * rect.height + (rect.top - stageRect.top);
    div.style.display = "";
    div.textContent = `材料 ${Math.round(seg.mm)} mm`;
    div.style.left = sx + "px";
    div.style.top = Math.max(20, sy - 6) + "px";
  }
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

/* ============================================================
   参考图：上传 / 拖拽 / 粘贴 / 预览查看器
   ============================================================ */
const REFERENCE_LS_KEY = "huahui:reference:v1";

function setupReferenceImage() {
  const dropzone = document.getElementById("reference-dropzone");
  const preview  = document.getElementById("reference-preview");
  const placeholder = document.getElementById("reference-placeholder");
  const status = document.getElementById("reference-status");
  const fileInput = document.getElementById("reference-file-input");
  const pasteBtn = document.getElementById("reference-paste-btn");
  const clearBtn = document.getElementById("reference-clear-btn");
  if (!dropzone || !preview || !placeholder) return;

  const setStatus = (msg, type) => {
    if (!status) return;
    status.textContent = msg || "";
    status.classList.toggle("success", type === "success");
    status.classList.toggle("error", type === "error");
  };

  const setImage = (dataUrl) => {
    if (!dataUrl) {
      preview.hidden = true;
      preview.removeAttribute("src");
      placeholder.style.display = "";
      dropzone.classList.remove("has-image");
      try { localStorage.removeItem(REFERENCE_LS_KEY); } catch {}
      setStatus("");
      return;
    }
    preview.src = dataUrl;
    preview.hidden = false;
    placeholder.style.display = "none";
    dropzone.classList.add("has-image");
    try { localStorage.setItem(REFERENCE_LS_KEY, dataUrl); } catch {}
    setStatus("已加载参考图，点击可放大查看", "success");
  };

  // 恢复
  try {
    const saved = localStorage.getItem(REFERENCE_LS_KEY);
    if (saved) setImage(saved);
  } catch {}

  const readFileAsDataUrl = (file) => new Promise((resolve, reject) => {
    if (!file || !/image\//.test(file.type)) return reject(new Error("不是图片文件"));
    if (file.size > 8 * 1024 * 1024) return reject(new Error("图片过大（>8MB）"));
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = () => reject(new Error("读取失败"));
    r.readAsDataURL(file);
  });

  // 单击：仅聚焦（让 Ctrl+V / Del 可用）
  // 双击：无图打开文件选择，有图打开放大查看器
  dropzone.addEventListener("dblclick", () => {
    if (dropzone.classList.contains("has-image")) {
      openReferenceViewer();
    } else if (fileInput) {
      fileInput.click();
    }
  });
  dropzone.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") {
      e.preventDefault();
      if (dropzone.classList.contains("has-image")) openReferenceViewer();
      else if (fileInput) fileInput.click();
      return;
    }
    if ((e.key === "Delete" || e.key === "Backspace") && dropzone.classList.contains("has-image")) {
      e.preventDefault();
      setImage(null);
    }
  });
  // 鼠标按下立即聚焦，确保后续 Ctrl+V 立刻可用
  dropzone.addEventListener("mousedown", () => {
    try { dropzone.focus({ preventScroll: true }); } catch { dropzone.focus(); }
  });

  if (fileInput) {
    fileInput.addEventListener("change", () => {
      const f = fileInput.files && fileInput.files[0];
      if (!f) return;
      readFileAsDataUrl(f).then(setImage).catch((err) => setStatus(err.message, "error"));
      fileInput.value = "";
    });
  }

  // 拖拽
  ["dragenter", "dragover"].forEach((ev) => {
    dropzone.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.add("is-active");
    });
  });
  ["dragleave", "drop"].forEach((ev) => {
    dropzone.addEventListener(ev, (e) => {
      e.preventDefault(); e.stopPropagation();
      dropzone.classList.remove("is-active");
    });
  });
  dropzone.addEventListener("drop", (e) => {
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) readFileAsDataUrl(f).then(setImage).catch((err) => setStatus(err.message, "error"));
  });

  // 粘贴：聚焦在 dropzone 时全局粘贴生效
  document.addEventListener("paste", (e) => {
    if (document.activeElement !== dropzone && !dropzone.matches(":hover")) return;
    const items = e.clipboardData && e.clipboardData.items;
    if (!items) return;
    for (const it of items) {
      if (/image\//.test(it.type)) {
        const f = it.getAsFile();
        if (f) {
          e.preventDefault();
          readFileAsDataUrl(f).then(setImage).catch((err) => setStatus(err.message, "error"));
          return;
        }
      }
    }
  });

  if (pasteBtn) {
    pasteBtn.addEventListener("click", async () => {
      try {
        if (!navigator.clipboard || !navigator.clipboard.read) {
          setStatus("当前浏览器不支持读剪切板，请直接 Ctrl+V 粘贴或拖拽图片", "error");
          return;
        }
        const list = await navigator.clipboard.read();
        for (const item of list) {
          for (const t of item.types) {
            if (/image\//.test(t)) {
              const blob = await item.getType(t);
              const f = new File([blob], "pasted.png", { type: t });
              readFileAsDataUrl(f).then(setImage).catch((err) => setStatus(err.message, "error"));
              return;
            }
          }
        }
        setStatus("剪切板里没有图片", "error");
      } catch (err) {
        setStatus("剪切板读取失败：" + (err.message || ""), "error");
      }
    });
  }

  if (clearBtn) {
    clearBtn.addEventListener("click", () => setImage(null));
  }

  // 查看器
  const viewer = document.getElementById("reference-viewer");
  const viewerImg = document.getElementById("reference-viewer-image");
  const viewerClose = document.getElementById("reference-viewer-close");
  const viewerVp = document.getElementById("reference-viewer-viewport");
  const viewerStage = document.getElementById("reference-viewer-stage");
  if (viewerClose) viewerClose.addEventListener("click", closeReferenceViewer);
  if (viewer) viewer.addEventListener("click", (e) => {
    if (e.target === viewer) closeReferenceViewer();
  });
  document.addEventListener("keydown", (e) => {
    if (e.key === "Escape" && viewer && !viewer.hidden) closeReferenceViewer();
  });

  // ====== 查看器 缩放 / 拖拽 ======
  const refView = { scale: 1, min: 1, max: 8, dragging: false, startX: 0, startY: 0, startScrollLeft: 0, startScrollTop: 0 };

  function getRefViewMetrics() {
    if (!viewerVp || !viewerStage || !viewerImg) return null;
    if (!viewerImg.naturalWidth || !viewerImg.naturalHeight) return null;
    const vw = viewerVp.clientWidth || 0;
    const vh = viewerVp.clientHeight || 0;
    if (!vw || !vh) return null;
    const fit = Math.min(vw / viewerImg.naturalWidth, vh / viewerImg.naturalHeight, 1);
    const rw = viewerImg.naturalWidth * fit * refView.scale;
    const rh = viewerImg.naturalHeight * fit * refView.scale;
    const sw = Math.max(Math.round(rw), vw);
    const sh = Math.max(Math.round(rh), vh);
    const il = Math.round((sw - rw) / 2);
    const it = Math.round((sh - rh) / 2);
    return { vw, vh, fit, rw: Math.round(rw), rh: Math.round(rh), sw, sh, il, it };
  }

  function applyRefViewLayout(anchor) {
    const m = getRefViewMetrics();
    if (!m) return;
    if (refView.scale < refView.min) refView.scale = refView.min;
    if (refView.scale > refView.max) refView.scale = refView.max;
    viewerStage.style.width  = m.sw + "px";
    viewerStage.style.height = m.sh + "px";
    viewerImg.style.position = "absolute";
    viewerImg.style.width  = m.rw + "px";
    viewerImg.style.height = m.rh + "px";
    viewerImg.style.left   = m.il + "px";
    viewerImg.style.top    = m.it + "px";
    viewerImg.style.maxWidth = "none";
    viewerImg.style.maxHeight = "none";
    viewerVp.classList.toggle("is-dragging", !!refView.dragging);
    if (!anchor) {
      viewerVp.scrollLeft = Math.max(0, (m.sw - m.vw) / 2);
      viewerVp.scrollTop  = Math.max(0, (m.sh - m.vh) / 2);
      return;
    }
    viewerVp.scrollLeft = Math.max(0, Math.min(m.sw - m.vw, anchor.scrollLeft));
    viewerVp.scrollTop  = Math.max(0, Math.min(m.sh - m.vh, anchor.scrollTop));
  }

  function resetRefViewTransform() {
    refView.scale = 1;
    refView.dragging = false;
    applyRefViewLayout();
  }

  function zoomRefView(factor, clientX, clientY) {
    const m0 = getRefViewMetrics();
    if (!m0) return;
    const rect = viewerVp.getBoundingClientRect();
    const px = clientX - rect.left, py = clientY - rect.top;
    const prev = refView.scale;
    const next = Math.max(refView.min, Math.min(refView.max, prev * factor));
    if (Math.abs(next - prev) < 1e-4) return;
    const nx = (viewerVp.scrollLeft + px - m0.il) / (m0.fit * prev);
    const ny = (viewerVp.scrollTop  + py - m0.it) / (m0.fit * prev);
    refView.scale = next;
    const m1 = getRefViewMetrics();
    if (!m1) return;
    applyRefViewLayout({
      scrollLeft: nx * (m1.fit * next) + m1.il - px,
      scrollTop:  ny * (m1.fit * next) + m1.it - py,
    });
  }

  if (viewerVp) {
    viewerVp.addEventListener("wheel", (e) => {
      e.preventDefault();
      zoomRefView(e.deltaY < 0 ? 1.14 : 1 / 1.14, e.clientX, e.clientY);
    }, { passive: false });
    viewerVp.addEventListener("pointerdown", (e) => {
      if (e.button !== 0) return;
      refView.dragging = true;
      refView.startX = e.clientX; refView.startY = e.clientY;
      refView.startScrollLeft = viewerVp.scrollLeft;
      refView.startScrollTop = viewerVp.scrollTop;
      viewerVp.classList.add("is-dragging");
      try { viewerVp.setPointerCapture && viewerVp.setPointerCapture(e.pointerId); } catch {}
      e.preventDefault();
    });
    viewerVp.addEventListener("pointermove", (e) => {
      if (!refView.dragging) return;
      viewerVp.scrollLeft = refView.startScrollLeft - (e.clientX - refView.startX);
      viewerVp.scrollTop  = refView.startScrollTop  - (e.clientY - refView.startY);
    });
    const stopDrag = (e) => {
      if (!refView.dragging) return;
      refView.dragging = false;
      viewerVp.classList.remove("is-dragging");
      try { e && viewerVp.releasePointerCapture && viewerVp.releasePointerCapture(e.pointerId); } catch {}
    };
    viewerVp.addEventListener("pointerup", stopDrag);
    viewerVp.addEventListener("pointercancel", stopDrag);
    viewerVp.addEventListener("pointerleave", stopDrag);
    // 双击 复位
    viewerVp.addEventListener("dblclick", () => { resetRefViewTransform(); });
  }
  if (viewerImg) {
    viewerImg.addEventListener("load", () => {
      if (viewer && !viewer.hidden) resetRefViewTransform();
    });
  }
  window.addEventListener("resize", () => {
    if (viewer && !viewer.hidden) applyRefViewLayout();
  });

  function openReferenceViewer() {
    if (!viewer || !viewerImg) return;
    const src = preview.getAttribute("src");
    if (!src) return;
    viewerImg.src = src;
    viewer.hidden = false;
    requestAnimationFrame(resetRefViewTransform);
    setTimeout(resetRefViewTransform, 120);
  }
  function closeReferenceViewer() {
    if (!viewer) return;
    viewer.hidden = true;
    if (viewerImg) {
      viewerImg.removeAttribute("src");
      viewerImg.style.cssText = "";
    }
    if (viewerStage) {
      viewerStage.style.width = "";
      viewerStage.style.height = "";
    }
    refView.scale = 1;
    refView.dragging = false;
  }
}

function collectSvgCss() {
  const out = [];
  for (const sheet of document.styleSheets) {
    try {
      for (const rule of sheet.cssRules || []) {
        const sel = rule.selectorText || "";
        if (/svg|\.svg-|text|line|path|rect|circle/i.test(sel) || rule.type === 1 && sel.startsWith("."))
          out.push(rule.cssText);
      }
    } catch {}
  }
  return out.join("\n");
}

async function exportSnapshot() {
  setCapStatus("正在生成截图...", false);
  const blob = await buildSnapshotBlob();
  if (!(navigator.clipboard && window.ClipboardItem)) {
    setCapStatus("当前浏览器不支持写剪贴板，请用 Edge / Chrome", true);
    return;
  }
  await navigator.clipboard.write([new ClipboardItem({ "image/png": blob })]);
  setCapStatus("已复制到剪切板", false);
}

/* —— 编辑器：在 dialog 中打开截图，可点击添加文字标注 —— */
async function openSnapshotEditor() {
  setCapStatus("正在生成编辑图...", false);
  const blob = await buildSnapshotBlob();
  const url = URL.createObjectURL(blob);
  const dlg = ensureSnapshotEditor();
  const img = dlg.querySelector(".snap-img");
  img.onload = () => {
    const c = dlg.querySelector(".snap-canvas");
    c.width = img.naturalWidth; c.height = img.naturalHeight;
    redrawSnap(dlg);
  };
  img.src = url;
  dlg._notes = [];
  dlg._url = url;
  dlg.hidden = false;
  setCapStatus("已打开编辑器，单击图片添加文字。", false);
}

function ensureSnapshotEditor() {
  let dlg = document.getElementById("snap-editor");
  if (dlg) return dlg;
  dlg = document.createElement("div");
  dlg.id = "snap-editor";
  dlg.className = "snapshot-editor";
  dlg.hidden = true;
  dlg.innerHTML = `
    <div class="snapshot-editor__panel" style="display:grid;grid-template-rows:auto minmax(0,1fr);gap:10px;padding:12px;">
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap;">
        <strong style="font-size:0.9rem;">截图编辑 · 单击图片添加文字</strong>
        <input type="text" class="snap-text" placeholder="待标注文字" style="flex:1;min-width:160px;padding:6px 10px;border:1px solid #d6dee6;border-radius:8px;font-size:0.85rem;">
        <label style="font-size:0.75rem;color:#64748b;">字号
          <input type="number" class="snap-size" value="20" min="10" max="80" style="width:56px;margin-left:4px;padding:4px;border:1px solid #d6dee6;border-radius:6px;">
        </label>
        <label style="font-size:0.75rem;color:#64748b;">颜色
          <input type="color" class="snap-color" value="#dc2626" style="width:34px;height:28px;border:none;background:transparent;vertical-align:middle;">
        </label>
        <button type="button" class="snap-undo capture-btn capture-btn--edit" style="padding:6px 12px;">撤销</button>
        <button type="button" class="snap-clear capture-btn capture-btn--edit" style="padding:6px 12px;background:linear-gradient(135deg,#64748b,#475569);">清空</button>
        <button type="button" class="snap-save capture-btn" style="padding:6px 12px;">保存 PNG</button>
        <button type="button" class="snap-close capture-btn" style="padding:6px 12px;background:linear-gradient(135deg,#0f172a,#1e293b);">关闭</button>
      </div>
      <div class="snap-stage" style="position:relative;overflow:auto;background:#0f172a;border-radius:12px;display:flex;align-items:center;justify-content:center;">
        <div style="position:relative;display:inline-block;">
          <img class="snap-img" alt="" style="display:block;max-width:100%;height:auto;">
          <canvas class="snap-canvas" style="position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;"></canvas>
        </div>
      </div>
    </div>`;
  document.body.appendChild(dlg);

  const canvas = dlg.querySelector(".snap-canvas");
  canvas.addEventListener("click", (e) => {
    const text = dlg.querySelector(".snap-text").value.trim();
    if (!text) { dlg.querySelector(".snap-text").focus(); return; }
    const size = parseInt(dlg.querySelector(".snap-size").value, 10) || 20;
    const color = dlg.querySelector(".snap-color").value || "#dc2626";
    const r = canvas.getBoundingClientRect();
    const x = (e.clientX - r.left) * (canvas.width / r.width);
    const y = (e.clientY - r.top)  * (canvas.height / r.height);
    dlg._notes.push({ text, x, y, size, color });
    redrawSnap(dlg);
  });
  dlg.querySelector(".snap-undo").addEventListener("click", () => { dlg._notes.pop(); redrawSnap(dlg); });
  dlg.querySelector(".snap-clear").addEventListener("click", () => { dlg._notes = []; redrawSnap(dlg); });
  dlg.querySelector(".snap-close").addEventListener("click", () => {
    dlg.hidden = true;
    if (dlg._url) { URL.revokeObjectURL(dlg._url); dlg._url = null; }
  });
  dlg.querySelector(".snap-save").addEventListener("click", () => saveSnap(dlg));
  return dlg;
}

function redrawSnap(dlg) {
  const canvas = dlg.querySelector(".snap-canvas");
  const img = dlg.querySelector(".snap-img");
  const ctx = canvas.getContext("2d");
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // 仅画注释；底图由 <img> 显示
  for (const n of dlg._notes) {
    ctx.font = `700 ${n.size}px 'Microsoft YaHei UI', sans-serif`;
    ctx.fillStyle = n.color;
    ctx.strokeStyle = "rgba(255,255,255,0.95)";
    ctx.lineWidth = Math.max(2, n.size / 8);
    ctx.lineJoin = "round";
    ctx.strokeText(n.text, n.x, n.y);
    ctx.fillText(n.text, n.x, n.y);
  }
}

function saveSnap(dlg) {
  const img = dlg.querySelector(".snap-img");
  const overlay = dlg.querySelector(".snap-canvas");
  const out = document.createElement("canvas");
  out.width = img.naturalWidth; out.height = img.naturalHeight;
  const ctx = out.getContext("2d");
  ctx.drawImage(img, 0, 0);
  ctx.drawImage(overlay, 0, 0);
  out.toBlob((blob) => {
    if (!blob) { setCapStatus("保存失败", true); return; }
    const u = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = u;
    a.download = `HUAHUI-edit-${new Date().toISOString().slice(0,16).replace(/[:T]/g,"")}.png`;
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(u), 1500);
    setCapStatus("已保存编辑后的 PNG", false);
  }, "image/png");
}

          </div>
        </div>
        <div id="snapshot-arrow-group" class="snapshot-editor__group snapshot-editor__group--arrow" hidden>
          <div class="snapshot-editor__group-label">箭头粗细</div>
          <div class="snapshot-editor__range-row">
            <input type="range" id="snapshot-arrow-width" class="snapshot-editor__range" min="8" max="72" step="1" value="18">
            <div id="snapshot-arrow-width-value" class="snapshot-editor__range-value">18</div>
          </div>
        </div>
      </div>
    </div>
    <div id="snapshot-editor-viewport" class="snapshot-editor__viewport">
      <div class="snapshot-editor__canvas-wrap">
        <canvas id="snapshot-editor-canvas" class="snapshot-editor__canvas"></canvas>
      </div>
    </div>
  </div>
</div>

<!-- 3D 缺口右键菜单 -->
<div id="three-ctx-menu" hidden style="position:fixed;z-index:9997;background:#fff;border:1px solid #cbd5e1;border-radius:6px;box-shadow:0 6px 18px rgba(0,0,0,.14);padding:4px 0;min-width:120px;font-size:13px;">
    <button type="button" data-act="add"  style="display:block;width:100%;text-align:left;padding:6px 14px;border:0;background:transparent;cursor:pointer;">添加缺口</button>
    <button type="button" data-act="edit" hidden style="display:block;width:100%;text-align:left;padding:6px 14px;border:0;background:transparent;cursor:pointer;">修改缺口</button>
    <button type="button" data-act="del"  hidden style="display:block;width:100%;text-align:left;padding:6px 14px;border:0;background:transparent;cursor:pointer;color:#b91c1c;">删除缺口</button>
</div>

<!-- 3D 缺口输入弹窗 -->
<div id="three-notch-mask" hidden style="position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:9998;"></div>
<div id="three-notch-dlg" hidden style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:#fff;border-radius:10px;box-shadow:0 12px 36px rgba(0,0,0,.18);min-width:300px;padding:18px 20px;font-family:inherit;">
    <div id="three-notch-title" style="font-weight:600;font-size:15px;margin-bottom:12px;color:#15803d;">添加缺口</div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:8px;">
        <label style="width:48px;font-size:13px;color:#444;">宽 (mm)</label>
        <input id="three-notch-w" type="number" min="1" step="1" style="flex:1;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;">
    </div>
    <div style="display:flex;gap:10px;align-items:center;margin-bottom:14px;">
        <label style="width:48px;font-size:13px;color:#444;">高 (mm)</label>
        <input id="three-notch-h" type="number" min="1" step="1" style="flex:1;padding:6px 8px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px;">
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;">
        <button type="button" id="three-notch-cancel" style="padding:6px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer;">取消</button>
        <button type="button" id="three-notch-ok" style="padding:6px 14px;border:0;border-radius:6px;background:#15803d;color:#fff;cursor:pointer;">确定</button>
    </div>
</div>

<script src="./lib/extras.js" defer></script>
</body>
</html>
