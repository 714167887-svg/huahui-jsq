<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<meta name="theme-color" content="#0b1220" />
<title>HUAHUI · 淋浴房计算器</title>
<link rel="icon" href="data:," />
<style>
:root {
  /* 低亮度暖灰 · 参考 jsq 的红黑米白调 */
  --bg-1: #f8f4ef;
  --bg-2: #ece6e1;
  --surface: rgba(255,252,249,0.92);
  --surface-strong: #fffdfa;
  --surface-soft: #f8f2ee;
  --text: #1c1714;
  --text-2: #2d241f;
  --muted: #75675f;
  --muted-2: #a08f84;
  --border: #e0d5cd;
  --border-strong: #cdbdb2;
  --primary: #d61f1f;
  --primary-strong: #9f1111;
  --accent: #151515;
  --accent-deep: #9f1111;
  --accent-soft: rgba(214,31,31,0.08);
  --panel-span-width: 1040px;
  --bg: #ece6e1;
  --gold: #9a6b3e;
  --gold-deep: #75491e;
  --success: #0f766e;
  --danger: #dc2626;
  --viewer-dock-width: clamp(560px, 42vw, 760px);

  /* SVG 渲染器变量 - 沿用 jsq 原版红/酒红/棕褐 调性 */
  --wall-color: #1c1714;
  --label-color: #1c1714;
  --guide-color: #d61f1f;
  --guide-text-color: #d61f1f;
  --angle-color: #9a6b3e;
}
* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: 'Segoe UI Variable Text','Microsoft YaHei UI','PingFang SC',sans-serif;
  font-feature-settings: 'tnum' 1, 'ss01' 1;
  color: var(--text);
  min-height: 100vh;
  padding: 20px 14px 30px;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  background:
    linear-gradient(rgba(214,31,31,0.035) 1px, transparent 1px),
    linear-gradient(90deg, rgba(214,31,31,0.035) 1px, transparent 1px),
    radial-gradient(circle at top, rgba(214,31,31,0.08), transparent 34%),
    linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
  background-size: 28px 28px, 28px 28px, auto, auto;
  background-attachment: fixed;
  transition: padding-right 0.28s ease, justify-content 0.28s ease;
}

.container {
  width: 100%;
  max-width: 1140px;
  background: rgba(255,252,249,0.95);
  border: 1px solid rgba(255,255,255,0.86);
  border-radius: 22px;
  box-shadow: 0 24px 60px rgba(46,29,20,0.12);
  overflow: hidden;
  padding-bottom: 16px;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  transition: max-width 0.28s ease, box-shadow 0.28s ease;
}

header {
  position: relative;
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 12px;
  align-items: center;
  padding: 10px 12px 9px;
  background:
    radial-gradient(circle at top right, rgba(214,31,31,0.10), transparent 42%),
    linear-gradient(180deg, rgba(255,252,249,0.98) 0%, rgba(248,242,238,0.98) 100%);
  border-bottom: 1px solid #e4d8d0;
}
header::before {
  content:"";
  position:absolute; top:0; left:0; right:0; height:4px;
  background: linear-gradient(90deg, var(--primary) 0%, #f36b55 58%, #1c1714 100%);
}
.brand-side { display:flex; align-items:center; gap: 14px; }
.brand-mark {
  width: 38px; height: 38px;
  border-radius: 12px;
  background: linear-gradient(135deg, #0f172a 0%, #1e293b 60%, #334155 100%);
  display:flex; align-items:center; justify-content:center;
  color: var(--gold);
  font-weight: 900;
  font-size: 1.08rem;
  letter-spacing: 0.08em;
  box-shadow: 0 6px 14px rgba(15,23,42,0.22), inset 0 1px 0 rgba(255,255,255,0.18);
  font-family: 'Inter','HarmonyOS Sans SC',serif;
}
header h1 {
  margin: 0;
  font-size: 1.26rem;
  letter-spacing: 0.04em;
  font-weight: 800;
  color: var(--text);
  font-family: 'Bahnschrift SemiCondensed','Segoe UI Variable Display','Microsoft YaHei UI',sans-serif;
}
header p {
  margin: 2px 0 0;
  color: var(--muted);
  font-size: 0.74rem;
  letter-spacing: 0.04em;
}
.status-pill {
  display:inline-flex; align-items:center; gap: 8px;
  padding: 6px 12px;
  border-radius: 999px;
  background: rgba(15,23,42,0.04);
  border: 1px solid var(--border);
  font-size: 0.7rem;
  letter-spacing: 0.16em;
  color: var(--muted);
  font-weight: 700;
  transition: all .25s ease;
}
.status-pill::before {
  content:""; width:6px; height:6px; border-radius:50%;
  background: var(--muted-2);
  box-shadow: 0 0 0 3px rgba(148,163,184,0.18);
}
.status-pill.ok {
  color: var(--accent-deep);
  background: var(--accent-soft);
  border-color: rgba(214,31,31,0.18);
}
.status-pill.ok::before {
  background: var(--accent);
  box-shadow: 0 0 0 3px rgba(214,31,31,0.14);
}

.content { padding: 16px 18px 18px; }

.filter-row,
.control-row,
.diagram-workbench,
#diamond-inputs,
.action-row,
.glass-input-row,
.result-area {
  width: 100%;
  max-width: var(--panel-span-width);
  margin-left: auto;
  margin-right: auto;
}

/* 通用表单 */
label {
  display: block;
  margin-bottom: 0;
  font-weight: 700;
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.06em;
  line-height: 1.25;
}
input, select {
  width: 100%;
  padding: 9px 10px;
  border: 1px solid var(--border);
  border-radius: 11px;
  font-size: 0.89rem;
  font-family: inherit;
  background: rgba(255,255,255,0.96);
  color: var(--text);
  font-variant-numeric: tabular-nums;
  transition: border-color .18s ease, box-shadow .18s ease, transform .18s ease, background .18s ease;
}
input:hover, select:hover { border-color: var(--border-strong); }
input:focus, select:focus {
  outline: none;
  border-color: rgba(11,101,127,0.62);
  box-shadow: 0 0 0 3px rgba(11,101,127,0.10);
  transform: translateY(-1px);
  background: #fff;
}

/* 三栏筛选 */
.filter-row {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
  margin-bottom: 10px;
}
.filter-row > .form-group {
  padding: 9px 10px 10px;
  background: rgba(255,255,255,0.72);
  border: 1px solid #dde6ee;
  border-radius: 15px;
  box-shadow: 0 8px 16px rgba(15,23,42,0.03);
}
@media (max-width: 720px) { .filter-row { grid-template-columns: 1fr; } }

/* 控制行 - 全部塞进同一个可包裹的 flex */
.control-row {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 14px;
  align-items: stretch;
}
.control-card {
  flex: 1 1 200px;
  min-width: 0;
  background: var(--surface-soft);
  border: 1px solid var(--border);
  border-radius: 13px;
  padding: 9px 11px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  transition: border-color .2s ease, box-shadow .2s ease;
}
.control-card:hover { border-color: var(--border-strong); }
.control-card--mode { flex: 2 1 360px; }
.control-card--direction { flex: 1.6 1 280px; }
.control-card--field { flex: 1 1 180px; }
.control-card-label {
  display: block;
  font-size: 0.7rem;
  font-weight: 800;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin: 0;
}
.control-card--field input {
  margin-top: 0;
}
.control-card--enter {
  animation: cardIn .28s cubic-bezier(.34,1.56,.64,1) both;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateX(-8px) scale(0.96); }
  to   { opacity: 1; transform: translateX(0)    scale(1); }
}

/* 分段按钮（mode-selector / direction-selector） */
.mode-selector {
  display: flex;
  align-items: stretch;
  gap: 3px;
  background: rgba(238,243,247,0.92);
  border: 1px solid #d7e0e8;
  border-radius: 13px;
  padding: 3px;
  width: 100%;
  min-width: 0;
  position: relative;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.85);
}
.mode-btn {
  position: relative;
  flex: 1;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 0;
  border: 1px solid transparent;
  background: transparent;
  padding: 7px 8px;
  color: #425262;
  border-radius: 9px;
  cursor: pointer;
  font-family: inherit;
  text-align: center;
  line-height: 1.2;
  min-height: 36px;
  overflow: hidden;
  box-shadow: none;
  transition: background-color .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;
}
.mode-btn:hover:not(.active) {
  background: rgba(255,255,255,0.72);
  border-color: #dde5ec;
}
.mode-btn.active {
  background: var(--surface-strong);
  color: var(--primary-strong);
  border-color: #d1dbe4;
  box-shadow: inset 0 -2px 0 var(--primary), 0 3px 8px rgba(15,23,42,0.04);
}
.mode-btn-title {
  display: block;
  font-size: 0.77rem;
  font-weight: 700;
  letter-spacing: 0.015em;
  font-family: 'Bahnschrift SemiBold','Segoe UI Variable Text','Microsoft YaHei UI',sans-serif;
}
.mode-btn-subtitle { display: none; }
.mode-btn--single { align-items: center; text-align: center; }
.mode-btn--single .mode-btn-subtitle:empty { display: none; }

/* 主图舞台 */
.diagram-stage {
  position: relative;
  width: 100%;
  height: 284px;
  background: linear-gradient(180deg, #ffffff 0%, #f5f8fb 100%);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 0;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.92), 0 12px 24px rgba(15,23,42,0.045);
}
.diagram-stage::before,
.diagram-stage::after { display: none; }
#main-svg {
  width: 100%;
  height: 100%;
  display: block;
  background: transparent;
  border-radius: 0;
  position: relative;
  z-index: 1;
  transition: opacity .25s ease;
}
.diagram-stage.computing #main-svg { opacity: 0.45; }

/* 3D 渲染舞台 */
#three-canvas {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 16px;
  z-index: 2;
  cursor: grab;
}
#three-canvas:active { cursor: grabbing; }
.diagram-stage[data-view="3d"] #main-svg { display: none; }
.diagram-stage[data-view="2d"] #three-canvas { display: none; }
.diagram-stage[data-view="2d"] #three-labels { display: none; }
.three-labels {
  position: absolute; inset: 0; z-index: 2; pointer-events: none;
  font-family: 'Bahnschrift SemiCondensed','Microsoft YaHei UI',sans-serif;
}
.three-label {
  position: absolute;
  transform: translate(-50%, -100%);
  color: #1f2937;
  font-size: 0.82rem;
  font-weight: 800;
  letter-spacing: 0.02em;
  white-space: nowrap;
  text-shadow:
     0 1px 0 rgba(255,255,255,0.95),
     0 -1px 0 rgba(255,255,255,0.95),
     1px 0 0 rgba(255,255,255,0.95),
    -1px 0 0 rgba(255,255,255,0.95);
}
.view-switcher {
  position: absolute;
  top: 10px;
  right: 10px;
  z-index: 3;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 52px;
  height: 32px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: rgba(255,255,255,0.94);
  backdrop-filter: blur(6px);
  color: #1f2937;
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0.04em;
  cursor: pointer;
  user-select: none;
  box-shadow: 0 4px 10px rgba(15,23,42,0.08);
  transition: background .18s, color .18s, transform .12s;
  font-family: 'Bahnschrift SemiCondensed','Segoe UI Variable Text','Microsoft YaHei UI',sans-serif;
}
.view-switcher:hover { background: #ffffff; transform: translateY(-1px); }
.view-switcher[data-view="3d"] {
  background: linear-gradient(180deg, #d61f1f 0%, #a81212 100%);
  color: #fff;
  border-color: transparent;
  box-shadow: 0 4px 10px rgba(168,18,18,0.32);
}
.three-loading {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #9ca3af;
  font-size: 0.85rem;
  z-index: 4;
  pointer-events: none;
  font-family: 'Segoe UI Variable Text','Microsoft YaHei UI',sans-serif;
}
.three-hint {
  position: absolute;
  left: 12px;
  bottom: 10px;
  z-index: 3;
  background: rgba(15,23,42,0.55);
  color: #f8fafc;
  font-size: 0.7rem;
  padding: 3px 9px;
  border-radius: 999px;
  letter-spacing: 0.04em;
  pointer-events: none;
  font-family: 'Bahnschrift','Segoe UI Variable Text',sans-serif;
}

/* SVG 右键菜单 */
.force-edit-menu {
  position: fixed; z-index: 1200;
  min-width: 132px; padding: 6px;
  border-radius: 14px; border: 1px solid rgba(209, 219, 228, 0.96);
  background: rgba(255, 255, 255, 0.98);
  box-shadow: 0 18px 36px rgba(15, 23, 42, 0.14);
  backdrop-filter: blur(10px);
  font-family: 'Segoe UI Variable Text','Microsoft YaHei UI',sans-serif;
}
.force-edit-menu[hidden] { display: none; }
.force-edit-menu__item {
  display: block; width: 100%; padding: 9px 10px;
  border: 0; border-radius: 10px;
  background: transparent; color: #1c1714;
  font-size: 0.82rem; font-weight: 700;
  text-align: left;
  cursor: pointer;
  transition: background .15s, color .15s;
}
.force-edit-menu__item:hover {
  background: rgba(214, 31, 31, 0.08);
  color: #9f1111;
}
.force-edit-menu__item--danger:hover {
  background: rgba(214, 31, 31, 0.14);
  color: #9f1111;
}

/* 自定义插入字段 */
.svg-custom-field {
  fill: #1c1714;
  font-size: 18px;
  font-weight: 800;
  font-family: "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
  paint-order: stroke; stroke: #fff; stroke-width: 4px;
  cursor: grab;
  user-select: none;
}
.svg-custom-field.is-selected {
  fill: #d61f1f;
}
.svg-custom-field.is-dragging { cursor: grabbing; }
.svg-direction-label { cursor: grab; }
.svg-direction-label.is-dragging { cursor: grabbing; }

/* SVG 内部样式 - render.js 输出依赖这些 class */
.svg-wall { stroke: var(--wall-color); stroke-width: 4; fill: none; stroke-linecap: round; stroke-linejoin: round; }
.svg-guide { stroke: var(--guide-color); stroke-width: 2.5; fill: none; stroke-linecap: round; stroke-linejoin: round; stroke-dasharray: 4 2; opacity: .95; }
.svg-angle-arc { fill: none; stroke: var(--angle-color); stroke-width: 2; }
.svg-text, .svg-guide-text, .svg-angle-text {
  font-weight: 800;
  font-family: 'Inter','SF Mono',monospace;
  text-anchor: middle; dominant-baseline: middle;
  paint-order: stroke; stroke: #ffffff; stroke-width: 3.5px;
}
.svg-text { fill: var(--label-color); font-size: 17px; }
.svg-guide-text { fill: var(--guide-text-color); font-size: 17px; }
.svg-angle-text { fill: var(--angle-color); font-size: 18px; }
.svg-direction-label {
  fill: var(--guide-color);
  font-weight: 800; font-size: 22px;
  font-family: 'Inter','PingFang SC',sans-serif;
  paint-order: stroke; stroke: #fff; stroke-width: 4px;
}

/* 输入数据行 */
.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.input-row > .form-group { flex: 1 1 0; }
@media (max-width: 600px) {
  .input-row { flex-wrap: wrap; }
  .input-row .form-group { flex: 1 1 45%; }
}

/* 操作按钮 */
.action-row {
  display: flex;
  gap: 8px;
  margin-top: 4px;
}
.btn-calc {
  width: 100%;
  padding: 10px 12px;
  background: linear-gradient(135deg, #0e728d 0%, #0a596f 100%);
  color: white;
  border: none;
  border-radius: 12px;
  font-size: 0.91rem;
  font-weight: 700;
  letter-spacing: 0.03em;
  cursor: pointer;
  font-family: inherit;
  transition: transform 0.18s ease, box-shadow 0.18s ease, opacity 0.18s ease;
  margin-top: 4px;
  box-shadow: 0 12px 22px rgba(11,101,127,0.16);
}
.btn-calc:hover:not(:disabled) {
  transform: translateY(-1px);
  box-shadow: 0 15px 28px rgba(11,101,127,0.20);
}
.btn-calc:disabled {
  background: #edf3f7;
  color: #788696;
  border: 1px dashed #c7d2dd;
  box-shadow: none;
  cursor: not-allowed;
}
.action-row .btn-calc { flex: 1; margin-top: 0; }

/* 结果区 */
.result-area {
  margin-top: 14px;
  padding: 16px 18px 14px;
  background:
    linear-gradient(180deg, rgba(214,31,31,0.025) 0%, rgba(214,31,31,0.008) 100%),
    var(--surface-strong);
  border: 1px solid rgba(214,31,31,0.10);
  border-radius: 16px;
  animation: fadeUp .35s ease both;
}
@keyframes fadeUp {
  from { opacity:0; transform: translateY(8px); }
  to   { opacity:1; transform: translateY(0); }
}
.result-title {
  text-align: center;
  font-size: 0.78rem;
  letter-spacing: 0.16em;
  color: var(--muted);
  font-weight: 800;
  margin-bottom: 12px;
  text-transform: uppercase;
}
.result-title b { color: var(--accent-deep); margin-left: 6px; }
.result-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
  gap: 8px;
}
.result-cell {
  background: var(--surface-strong);
  border: 1px solid var(--border);
  border-radius: 11px;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 3px;
  transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
  animation: cardIn .32s cubic-bezier(.34,1.56,.64,1) both;
}
.result-cell:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 10px 22px -8px rgba(214,31,31,0.18);
}
.result-cell .k { font-size: 0.66rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-weight: 700; }
.result-cell .v { font-size: 1.04rem; font-weight: 800; font-variant-numeric: tabular-nums; color: var(--text); }
.result-cell.glass { background: linear-gradient(180deg, #fffdfa 0%, rgba(214,31,31,0.025) 100%); }
.result-cell.glass .v { color: var(--accent-deep); }

.glass-input-row {
  display:grid;
  grid-template-columns: 240px 1fr;
  gap:12px;
  align-items:end;
  margin-bottom: 12px;
}
@media (max-width: 600px) { .glass-input-row { grid-template-columns: 1fr; } }
.placeholder-tip {
  text-align:center; padding: 16px 10px;
  color: var(--muted); font-size: 0.84rem;
  background: var(--surface-soft);
  border: 1px dashed var(--border-strong);
  border-radius: 12px;
}

/* === 玻璃图（从 jsq 移植） === */
.glass-diagram-wrap {
  margin-top: 14px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.glass-diagram-title {
  text-align: center;
  font-weight: 800;
  font-size: 0.82rem;
  color: var(--accent-deep, #166534);
  letter-spacing: 0.03em;
  margin-bottom: 8px;
}
.glass-diagram-frame {
  position: relative;
  width: 100%;
  max-width: 720px;
  margin: 0 auto;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: #fff;
  overflow: hidden;
}
.glass-diagram-canvas {
  display: block;
  width: 100%;
  height: auto;
  border-radius: 8px;
}

.err {
  margin: 6px 0; min-height: 16px;
  color: var(--danger); font-size: 0.8rem; font-weight: 600;
}
.err:empty { display:none; }

footer.foot {
  text-align: center;
  color: var(--muted-2);
  font-size: 0.66rem;
  letter-spacing: 0.18em;
  padding: 14px 18px 6px;
  text-transform: uppercase;
}

/* ====== 工作台双栏（主图 + 参考图） ====== */
.diagram-workbench {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 312px;
  gap: 12px;
  align-items: stretch;
  margin: 14px auto 16px;
}
.diagram-workbench .diagram-stage { margin-bottom: 0; }
@media (max-width: 880px) {
  .diagram-workbench { grid-template-columns: 1fr; }
}

.reference-panel {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 0;
}

/* ====== 以下来自 jsq 原版 (reference + capture + snapshot-editor) ====== */
.reference-dropzone {
  flex: 1;
  min-height: 284px;
  height: 284px;
  border: 1px dashed #c9d5df;
  border-radius: 16px;
  background: linear-gradient(180deg, rgba(255,255,255,0.96) 0%, rgba(245,248,251,0.96) 100%);
  display: flex; align-items: center; justify-content: center;

<script type="module">
import { toNumber } from "./lib/protected-calc.js";

const $ = (s) => document.querySelector(s);
const $$ = (s) => document.querySelectorAll(s);

let currentMode = "angle";
let currentDirection = "left";
let glassCatalog = null;

async function loadGlassCatalog() {
  if (glassCatalog) return glassCatalog;
  try {
    const res = await fetch("./glass/catalog.json", { cache: "no-store" });
    if (!res.ok) throw new Error("HTTP " + res.status);
    glassCatalog = await res.json();
  } catch (err) {
    console.warn("glass catalog load failed:", err);
    glassCatalog = { entries: [] };
  }
  return glassCatalog;
}

function findGlassEntry(model, roomType) {
  if (!glassCatalog || !Array.isArray(glassCatalog.entries)) return null;
  return glassCatalog.entries.find((e) => e.model === model && e.roomType === roomType) || null;
}

function evalFormula(formula, totalHeight, materialWidth) {
  if (!formula) return null;
  const expr = String(formula)
    .replace(/总高/g, String(totalHeight))
    .replace(/材料/g, String(materialWidth))
    .replace(/[，,]/g, "");
  if (!/^[\d+\-*/().\s]+$/.test(expr)) return null;
  try { return Function(`"use strict";return (${expr});`)(); }
  catch { return null; }
}

function readPayload() {
  const payload = {
    roomType: "diamond",
    installType: $("#install-type").value,
    modelValue: $("#model-input").value,
    modelInput: $("#model-input").value,
    currentMode,
    currentDirection,
    shorten: toNumber($("#shorten-input").value, 0),
    stoneCenterWidth: toNumber($("#stone-center-width").value, 0),
    sinkTopOutwardValue: toNumber($("#sink-top-outward-value").value, 0),
    stoneInwardValue: toNumber($("#stone-inward-value").value, 0),
    angles: { l: $("#angle-l").value, r: $("#angle-r").value },
    inputs: {},
    forcedBaseDimensions: forcedDims.base || {},
    forcedAngleDimensions: forcedDims.angle || {},
  };
  if (currentMode === "angle") {
    payload.inputs = { l: $("#input-l").value, c: $("#input-c").value, r: $("#input-r").value };
  } else if (currentMode === "cross") {
    payload.inputs = {
      l2: $("#input-l").value, c2: $("#input-c").value, r2: $("#input-r").value,
      distLtoP2: toNumber($("#dist-l-p2").value, 0),
      distRtoP1: toNumber($("#dist-r-p1").value, 0),
    };
  } else if (currentMode === "pentagon") {
    payload.inputs = {
      l: $("#input-l").value, r: $("#input-r").value,
      ls: $("#input-ls").value, rs: $("#input-rs").value,
    };
  }
  return payload;
}

function fmt(n) { return Number.isFinite(n) ? Math.round(n * 10) / 10 : "—"; }

let drawTimer = null;
function scheduleDraw() {
  if (drawTimer) cancelAnimationFrame(drawTimer);
  $("#diagram-stage").classList.add("computing");
  drawTimer = requestAnimationFrame(() => {
    drawDiagram();
    $("#diagram-stage").classList.remove("computing");
  });
}

function drawDiagram() {
  const errBox = $("#err"); errBox.textContent = "";
  const svg = $("#main-svg");
  try {
    const payload = readPayload();
    const result = renderProtectedDiagram(payload);

    if (result && result.viewBox) {
      svg.setAttribute("viewBox", result.viewBox);
    }
    svg.innerHTML = (result && result.svgMarkup) || '<text x="50%" y="50%" text-anchor="middle" fill="#94a3b8" font-size="16">请输入数据生成示意图</text>';

    if (result && result.boxHeight) {
      svg.style.height = Math.min(560, Math.max(380, result.boxHeight)) + "px";
    }

    const status = $("#status-tag");
    const ok = result && result.geoLengths && (result.geoLengths.l + result.geoLengths.c + result.geoLengths.r) > 0;
    status.classList.toggle("ok", !!ok);
    status.querySelector("span").textContent = ok ? "已计算" : "等待输入";

    window.__lastResult = result;
    window.__lastPayload = payload;

    // 应用方向标签拖动偏移 + 渲染自定义字段层（覆盖在 render.js 输出之上）
    try { applyDirectionLabelOffset(); } catch (e) {}
    try { renderCustomFields(); } catch (e) {}

    // 同步 3D 视图（若已初始化）
    try { syncThreeFromSvg(svg); } catch (e) { console.warn("3D sync failed:", e); }

    // 玻璃区已展开则同步刷新
    if ($("#result-area")) renderGlassResult();
  } catch (err) {
    console.error(err);
    errBox.textContent = "渲染异常：" + (err && err.message || err);
  }
}

function escapeHtml(value) {
  return String(value == null ? '' : value)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

/* ===== 玻璃图（从 jsq 移植，仅含可视化部分） ===== */
// 8317 钻石型 PDF 标签框（PDF 坐标系：595×842）
const GLASS_DIAGRAM_LABELS_8317_LEFT = [
  [79.1, 335.3, 88.1, 366.7, 'l', 'h', true ],
  [211.0, 335.5, 220.0, 366.8, 'c', 'h', true ],
  [508.1, 335.3, 517.1, 366.7, 'r', 'h', true ],
  [130.5, 574.0, 161.8, 583.0, 'l', 'w', false],
  [287.8, 572.3, 319.3, 581.3, 'c', 'w', false],
  [445.2, 574.0, 476.5, 583.0, 'r', 'w', false]
];
const GLASS_DIAGRAM_LABELS_8317_RIGHT = [
  [66.3, 329.2, 77.2, 367.4, 'r', 'h', true ],
  [368.2, 329.3, 379.2, 367.6, 'c', 'h', true ],
  [502.3, 329.2, 513.2, 367.4, 'l', 'h', true ],
  [111.5, 579.0, 149.7, 589.9, 'r', 'w', false],
  [271.4, 577.2, 309.6, 588.1, 'c', 'w', false],
  [431.3, 579.0, 469.5, 589.9, 'l', 'w', false]
];
const GLASS_DIAGRAM_PDF_W = 595;
const GLASS_DIAGRAM_PDF_H = 842;
const _glassDiagImgCache = { url: null, img: null };

function getGlassDiagramImageUrl(glassEntry) {
  if (!glassEntry || !glassEntry.model) return null;
  const axis = currentDirection === 'right' ? '右轴' : '左轴';
  const name = glassEntry.model + ' ' + axis + (glassEntry.roomLabel || '') + '.png';
  try { return new URL('glass/' + name, window.location.href).href; }
  catch (e) { return null; }
}

function _renderGlassDiagramCanvas(canvas, img, labels, valMap) {
  canvas.width = img.naturalWidth;
  canvas.height = img.naturalHeight;
  const ctx = canvas.getContext('2d');
  const sx = img.naturalWidth / GLASS_DIAGRAM_PDF_W;
  const sy = img.naturalHeight / GLASS_DIAGRAM_PDF_H;
  ctx.drawImage(img, 0, 0);
  labels.forEach((lbl) => {
    const x0 = lbl[0]*sx, y0 = lbl[1]*sy, x1 = lbl[2]*sx, y1 = lbl[3]*sy;
    const seg = lbl[4], vtype = lbl[5], rotated = lbl[6];
    const p = valMap[seg]; if (!p) return;
    const val = String(vtype === 'h' ? p.glassH : p.glassW);
    const cx = (x0+x1)/2, cy = (y0+y1)/2;
    ctx.fillStyle = 'rgba(255,255,255,0.97)';
    ctx.fillRect(x0, y0, x1-x0, y1-y0);
    ctx.save();
    ctx.translate(cx, cy);
    if (rotated) ctx.rotate(-Math.PI/2);
    const fontSize = rotated ? Math.round(18*sy/2) : Math.round(18*sx/2);
    ctx.font = '900 ' + fontSize + 'px "Microsoft YaHei UI", sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.strokeStyle = '#ffffff'; ctx.lineWidth = 3;
    ctx.strokeText(val, 0, 0);
    ctx.fillStyle = '#ff00ff';
    ctx.fillText(val, 0, 0);
    ctx.restore();
  });
}

function drawGlassDiagram(panelData, glassEntry) {
  const wrap = document.getElementById('glass-diagram-wrap');
  if (!wrap || !panelData || !panelData.length) {
    if (wrap) wrap.style.display = 'none';
    return;
  }
  // 优先：catalog 配置 dxf 时，fetch DXF 直接渲染（含合页缺口）
  if (glassEntry && glassEntry.dxf) {
    renderDxfGlass(wrap, panelData, glassEntry, currentDirection);
    return;
  }
  const imgUrl = getGlassDiagramImageUrl(glassEntry);
  const isRight = currentDirection === 'right';
  const labels = isRight ? GLASS_DIAGRAM_LABELS_8317_RIGHT : GLASS_DIAGRAM_LABELS_8317_LEFT;
  const valMap = {};
  panelData.forEach((p) => { valMap[p.segment] = p; });
  const titleEl = document.getElementById('glass-diagram-title');
  const canvas = document.getElementById('glass-diag-canvas');
  if (!canvas) { wrap.style.display = 'none'; return; }
  if (titleEl) {
    titleEl.textContent = isRight ? '玻璃视图（右轴）'
      : (currentDirection === 'left' ? '玻璃视图（左轴）' : '玻璃视图');
  }
  if (!imgUrl) { wrap.style.display = 'none'; return; }
  // 隐藏可能存在的语义 SVG 容器
  const semHolder = document.getElementById('glass-diag-semantic');
  if (semHolder) semHolder.style.display = 'none';
  canvas.style.display = '';
  wrap.style.display = 'block';
  if (_glassDiagImgCache.url === imgUrl && _glassDiagImgCache.img) {
    _renderGlassDiagramCanvas(canvas, _glassDiagImgCache.img, labels, valMap);
  } else {
    const img = new Image();
    img.onload = () => {
      _glassDiagImgCache.url = imgUrl;
      _glassDiagImgCache.img = img;
      _renderGlassDiagramCanvas(canvas, img, labels, valMap);
    };
    img.onerror = () => { wrap.style.display = 'none'; };
    img.src = imgUrl;
  }
}

function clearGlassDiagram() {
  const wrap = document.getElementById('glass-diagram-wrap');
  if (wrap) wrap.style.display = 'none';
}

/* ===== DXF 直绘（解析 LINE/CIRCLE/MTEXT/DIMENSION/LWPOLYLINE） ===== */
const _glassDxfCache = {}; // url -> entities[]

function _parseDxfText(txt) {
  const ls = txt.split(/\r?\n/);
  let i = 0;
  while (i < ls.length - 1) {
    if (ls[i].trim() === '2' && ls[i+1].trim() === 'ENTITIES') break;
    i++;
  }
  if (i >= ls.length - 1) return [];
  i += 2;
  const ents = [];
  while (i < ls.length - 1) {
    const code = ls[i].trim();
    const val = (ls[i+1] || '').trim();
    if (code === '0') {
      if (val === 'ENDSEC') break;
      const ent = { type: val, _verts: [], _bulges: [] };
      i += 2;
      let curX = null;
      while (i < ls.length - 1) {
        const c = ls[i].trim();
        const v = (ls[i+1] || '').trim();
        if (c === '0') break;
        if (c === '102' && /^[{}]/.test(v)) { i += 2; continue; }
        // LWPOLYLINE: collect repeated 10/20 pairs as vertices, 42 as bulge
        if (ent.type === 'LWPOLYLINE') {
          if (c === '10') { curX = parseFloat(v); }
          else if (c === '20') {
            if (curX !== null) { ent._verts.push([curX, parseFloat(v)]); curX = null; }
          }
          else if (c === '42') {
            ent._bulges.push([ent._verts.length - 1, parseFloat(v)]);
          }
        }
        if (!(c in ent)) ent[c] = v;
        i += 2;
      }
      ents.push(ent);
    } else {
      i += 2;
    }
  }
  return ents;
}

function _escSvg(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function _cleanMtextString(raw) {
  let s = String(raw || '');
  s = s.replace(/\\P/g, ' ');
  s = s.replace(/\\[fFhHCcOoLlpQqTtWwAa][^;]*;/g, '');
  s = s.replace(/[{}]/g, '');
  // DXF 特殊控制码：%%C → Φ, %%D → °, %%P → ±, %%U/%%O → 下划线/上划线（去掉）
  s = s.replace(/%%[Cc]/g, 'Φ').replace(/%%[Dd]/g, '°').replace(/%%[Pp]/g, '±');
  s = s.replace(/%%[UuOo]/g, '');
  return s.trim();
}

function _entityXRange(e) {
  if (e.type === 'LINE') {
    const x1 = +e['10'], x2 = +e['11'];
    if (!isFinite(x1) || !isFinite(x2)) return null;
    return [Math.min(x1, x2), Math.max(x1, x2)];
  } else if (e.type === 'CIRCLE') {
    const cx = +e['10'], r = +e['40'] || 0;
    if (!isFinite(cx)) return null;
    return [cx - r, cx + r];
  } else if (e.type === 'MTEXT') {
    const x = +e['10']; if (!isFinite(x)) return null;
    return [x, x];
  } else if (e.type === 'DIMENSION') {
    const arr = [];
    ['13','14','11','10'].forEach(k => { if (isFinite(+e[k])) arr.push(+e[k]); });
    if (!arr.length) return null;
    return [Math.min.apply(null, arr), Math.max.apply(null, arr)];
  } else if (e.type === 'LWPOLYLINE') {
    if (!e._verts || !e._verts.length) return null;
    const xs = e._verts.map(v => v[0]).filter(isFinite);
    if (!xs.length) return null;
    return [Math.min.apply(null, xs), Math.max.apply(null, xs)];
  }
  return null;
}

// bulge → SVG arc segment ("A rx ry 0 large-arc sweep x y")
// bulge = tan(theta/4), where theta is included angle of arc
function _bulgeToArc(x1, y1, x2, y2, b, Y) {
  const theta = 4 * Math.atan(Math.abs(b));
  const chord = Math.hypot(x2-x1, y2-y1);
  const r = chord / (2 * Math.sin(theta/2));
  const largeArc = theta > Math.PI ? 1 : 0;
  // DXF positive bulge = CCW; SVG with Y-flipped renders CCW as CW visually; flip sweep
  const sweep = b > 0 ? 0 : 1;
  return 'A ' + r + ' ' + r + ' 0 ' + largeArc + ' ' + sweep + ' ' + x2 + ' ' + Y(y2);
}

function _buildGlassDxfSvg(ents, axis, panelData) {
  // panelData 用于把 DXF 中固化的「总高-N」MTEXT 替换为运行时计算的实际高度
  const heightByOffset = {};
  if (Array.isArray(panelData)) {
    panelData.forEach(p => {
      const m = String(p.heightFormula || '').match(/总高\s*-\s*(\d+(?:\.\d+)?)/);
      if (m) heightByOffset[m[1]] = p.glassH;
    });
  }
  const _replaceHeightFormula = (txt) => {
    if (!txt) return txt;
    return txt.replace(/总高\s*-\s*(\d+(?:\.\d+)?)/g, (full, n) => {
      const v = heightByOffset[n];
      return Number.isFinite(v) ? String(v) : full;
    });
  };
  // 预过滤：保留 DIMENSION 实体（其 group 1 文本是孔位/开缺尺寸），但渲染时只画文字不画蓝色虚线/箭头
  // 计算全图水平 bbox 用于按 axis 裁剪
  const allXs = [];
  ents.forEach(e => {
    const r = _entityXRange(e);
    if (!r) return;
    if (isFinite(r[0])) allXs.push(r[0]);
    if (isFinite(r[1])) allXs.push(r[1]);
  });
  let sliceMid = null;
  if (allXs.length && (axis === 'left' || axis === 'right')) {
    sliceMid = (Math.min.apply(null, allXs) + Math.max.apply(null, allXs)) / 2;
  }
  const onSide = (x) => axis === 'left' ? x <= sliceMid + 1e-6 : x >= sliceMid - 1e-6;

  const filtered = [];
  ents.forEach(e => {
    if (sliceMid === null) { filtered.push(e); return; }
    if (e.type === 'LINE') {
      const x1 = +e['10'], x2 = +e['11'], y1 = +e['20'], y2 = +e['21'];
      if (!isFinite(x1) || !isFinite(x2)) { filtered.push(e); return; }
      const i1 = onSide(x1), i2 = onSide(x2);
      if (i1 && i2) { filtered.push(e); return; }
      if (!i1 && !i2) return;
      const dx = x2 - x1;
      if (Math.abs(dx) < 1e-9) return;
      const t = (sliceMid - x1) / dx;
      const iy = y1 + t * (y2 - y1);
      const ne = { type: 'LINE' };
      if (i1) { ne['10'] = x1; ne['20'] = y1; ne['11'] = sliceMid; ne['21'] = iy; }
      else    { ne['10'] = sliceMid; ne['20'] = iy; ne['11'] = x2; ne['21'] = y2; }
      filtered.push(ne);
    } else if (e.type === 'CIRCLE' || e.type === 'MTEXT') {
      const x = +e['10'];
      if (isFinite(x) && onSide(x)) filtered.push(e);
    } else if (e.type === 'DIMENSION') {
      let dxv;
      if (isFinite(+e['11'])) dxv = +e['11'];
      else if (isFinite(+e['13']) && isFinite(+e['14'])) dxv = (+e['13'] + +e['14']) / 2;
      else dxv = +e['10'];
      if (isFinite(dxv) && onSide(dxv)) filtered.push(e);
    } else if (e.type === 'LWPOLYLINE') {
      // 取顶点中位数 x，整体在某侧才保留（避免在多段折弯线中切断）
      if (!e._verts || !e._verts.length) return;
      const xs = e._verts.map(v => v[0]).filter(isFinite).sort((a,b)=>a-b);
      const mx = xs[Math.floor(xs.length/2)];
      if (onSide(mx)) filtered.push(e);
    } else {
      filtered.push(e);
    }
  });

  // Bounding box for viewBox
  const xs = [], ys = [];
  filtered.forEach(e => {
    if (e.type === 'LINE') {
      xs.push(+e['10'], +e['11']); ys.push(+e['20'], +e['21']);
    } else if (e.type === 'CIRCLE') {
      const cx = +e['10'], cy = +e['20'], r = +e['40'] || 0;
      xs.push(cx - r, cx + r); ys.push(cy - r, cy + r);
    } else if (e.type === 'MTEXT') {
      xs.push(+e['10']); ys.push(+e['20']);
    } else if (e.type === 'DIMENSION') {
      ['13','14','11','10'].forEach(k => { if (isFinite(+e[k])) xs.push(+e[k]); });
      ['23','24','21','20'].forEach(k => { if (isFinite(+e[k])) ys.push(+e[k]); });
    } else if (e.type === 'LWPOLYLINE') {
      e._verts.forEach(v => { if (isFinite(v[0]) && isFinite(v[1])) { xs.push(v[0]); ys.push(v[1]); } });
    }
  });
  const xsF = xs.filter(isFinite), ysF = ys.filter(isFinite);
  if (!xsF.length) return '';
  const minX = Math.min.apply(null, xsF), maxX = Math.max.apply(null, xsF);
  const minY = Math.min.apply(null, ysF), maxY = Math.max.apply(null, ysF);
  const w = maxX - minX, h = maxY - minY;
  const pad = (w + h) * 0.04 || 10;
  const vbX = minX - pad, vbY = -(maxY) - pad;
  const vbW = w + pad * 2, vbH = h + pad * 2;
  const unit = Math.max(vbW, vbH);
  const stroke = unit / 600;
  const dimStroke = unit / 900;
  const fontSize = unit / 35;
  const dimFont = unit / 45;
  const Y = (y) => -(+y);

  // 收集闭合矩形（用于给「总高-N」高度标签自绘引线箭头指向最近矩形）
  const heightRects = filtered.filter(e =>
    e.type === 'LWPOLYLINE' && e['70'] === '1' && e._verts && e._verts.length === 4
  ).map(e => {
    const xs = e._verts.map(v => v[0]);
    const ys = e._verts.map(v => v[1]);
    return {
      minX: Math.min.apply(null, xs), maxX: Math.max.apply(null, xs),
      minY: Math.min.apply(null, ys), maxY: Math.max.apply(null, ys)
    };
  });
  const _findNearestRect = (tx, ty) => {
    let best = null, bestD = Infinity;
    heightRects.forEach(r => {
      const cx = (r.minX + r.maxX) / 2, cy = (r.minY + r.maxY) / 2;
      const d = Math.hypot(tx - cx, ty - cy);
      if (d < bestD) { bestD = d; best = r; }
    });
    return best;
  };
  const arrowSize = unit / 80;

  let body = '';
  filtered.forEach(e => {
    if (e.type === 'LINE') {
      body += '<line x1="' + (+e['10']) + '" y1="' + Y(e['20']) +
              '" x2="' + (+e['11']) + '" y2="' + Y(e['21']) +
              '" stroke="#1f2937" stroke-width="' + stroke + '" stroke-linecap="round"/>';
    } else if (e.type === 'CIRCLE') {
      body += '<circle cx="' + (+e['10']) + '" cy="' + Y(e['20']) +
              '" r="' + (+e['40']) + '" fill="none" stroke="#dc2626" stroke-width="' + stroke + '"/>';
    } else if (e.type === 'MTEXT') {
      const rawCleaned = _cleanMtextString(e['1']);
      const txt = _replaceHeightFormula(rawCleaned);
      if (!txt) return;
      let fs = +e['40']; if (!isFinite(fs) || fs <= 0) fs = fontSize;
      // 钳位：DXF 中很多数字 MTEXT 的字号被设为 5-20mm，相对整图(1000+ mm)太小看不见
      if (fs < fontSize * 0.6) fs = fontSize * 0.7;
      const tx = +e['10'], ty = +e['20'];
      // 给高度标签自绘引线箭头：从文字水平延伸到最近闭合矩形的最近垂直边
      const isHeight = /总高\s*-\s*\d/.test(rawCleaned);
      if (isHeight) {
        const r = _findNearestRect(tx, ty);
        if (r) {
          let target;
          if (tx < r.minX) target = r.minX;
          else if (tx > r.maxX) target = r.maxX;
          else target = (Math.abs(tx - r.minX) < Math.abs(tx - r.maxX)) ? r.minX : r.maxX;
          const dir = target > tx ? 1 : -1;
          const lineStart = tx + dir * (fs * (txt.length * 0.55 + 0.6));
          const lineEnd = target;
          if ((dir > 0 && lineEnd > lineStart) || (dir < 0 && lineEnd < lineStart)) {
            body += '<line x1="' + lineStart + '" y1="' + Y(ty + fs * 0.3) +
                    '" x2="' + lineEnd + '" y2="' + Y(ty + fs * 0.3) +
                    '" stroke="#1d4ed8" stroke-width="' + dimStroke + '"/>';
            const ah = arrowSize;
            const yA = Y(ty + fs * 0.3);
            body += '<polygon points="' + lineEnd + ',' + yA + ' ' +
                    (lineEnd - dir * ah * 1.5) + ',' + (yA - ah * 0.5) + ' ' +
                    (lineEnd - dir * ah * 1.5) + ',' + (yA + ah * 0.5) +
                    '" fill="#1d4ed8"/>';
          }
        }
      }
      body += '<text x="' + tx + '" y="' + Y(ty) +
              '" font-size="' + fs + '" fill="#111827" font-family="Microsoft YaHei UI, sans-serif"' +
              ' text-anchor="start" dominant-baseline="hanging">' + _escSvg(txt) + '</text>';
    } else if (e.type === 'DIMENSION') {
      // 不画 DXF 原生的虚线/引线，只渲染文字（即孔位/开缺尺寸数值）
      const x1 = +e['13'], y1 = +e['23'], x2 = +e['14'], y2 = +e['24'];
      let tx = +e['11'], ty = +e['21'];
      if (!isFinite(tx) || !isFinite(ty)) {
        tx = isFinite(x1) ? (x1 + x2) / 2 : +e['10'];
        ty = isFinite(y1) ? (y1 + y2) / 2 : +e['20'];
      }
      let label = _replaceHeightFormula(_cleanMtextString(e['1']));
      if (!label || label === '<>') {
        if (isFinite(x1) && isFinite(x2)) label = String(Math.round(Math.hypot(x2-x1, y2-y1)));
      }
      if (label && isFinite(tx) && isFinite(ty)) {
        // Φ/R 标注（孔位直径/圆角半径）用红色，其余尺寸用蓝色
        const isHoleOrRadius = /[ΦR]/.test(label);
        const color = isHoleOrRadius ? '#dc2626' : '#1d4ed8';
        body += '<text x="' + tx + '" y="' + Y(ty) +
                '" font-size="' + dimFont + '" fill="' + color + '"' +
                ' text-anchor="middle" dominant-baseline="middle">' + _escSvg(label) + '</text>';
      }
    } else if (e.type === 'LWPOLYLINE') {
      if (!e._verts || e._verts.length < 2) return;
      const closed = e['70'] === '1';
      const bulgeMap = {};
      (e._bulges || []).forEach(b => { bulgeMap[b[0]] = b[1]; });
      const verts = e._verts;
      let d = 'M ' + verts[0][0] + ' ' + Y(verts[0][1]);
      for (let k = 0; k < verts.length - 1; k++) {
        const b = bulgeMap[k];
        if (b !== undefined && Math.abs(b) > 1e-6) {
          d += ' ' + _bulgeToArc(verts[k][0], verts[k][1], verts[k+1][0], verts[k+1][1], b, Y);
        } else {
          d += ' L ' + verts[k+1][0] + ' ' + Y(verts[k+1][1]);
        }
      }
      if (closed) {
        const lastIdx = verts.length - 1;
        const b = bulgeMap[lastIdx];
        if (b !== undefined && Math.abs(b) > 1e-6) {
          d += ' ' + _bulgeToArc(verts[lastIdx][0], verts[lastIdx][1], verts[0][0], verts[0][1], b, Y);
        }
        d += ' Z';
      }
      body += '<path d="' + d + '" fill="none" stroke="#1f2937" stroke-width="' + stroke +
              '" stroke-linejoin="round" stroke-linecap="round"/>';
    }
  });

  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' +
         vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH +
         '" preserveAspectRatio="xMidYMid meet"' +
         ' style="width:100%;height:auto;max-height:560px;display:block;background:#fff;border-radius:6px;">' +
         body + '</svg>';
}

function renderDxfGlass(wrap, panelData, glassEntry, axis) {
  const titleEl = document.getElementById('glass-diagram-title');
  const canvas = document.getElementById('glass-diag-canvas');
  const frame = document.getElementById('glass-diag-frame');
  if (!frame) { wrap.style.display = 'none'; return; }
  const modelLabel = (glassEntry && glassEntry.modelKey) ? glassEntry.modelKey + '款'
                    : (glassEntry && glassEntry.model ? glassEntry.model : '');
  if (titleEl) {
    const axisText = axis === 'right' ? '右轴' : axis === 'left' ? '左轴' : '未选轴向';
    titleEl.textContent = '玻璃图（' + (modelLabel ? modelLabel + ' · ' : '') + axisText + ' · 含合页缺口）';
  }
  if (canvas) canvas.style.display = 'none';

  let holder = document.getElementById('glass-diag-dxf');
  if (!holder) {
    holder = document.createElement('div');
    holder.id = 'glass-diag-dxf';
    holder.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;';
    frame.appendChild(holder);
  }
  // 隐藏旧语义容器
  const semHolder = document.getElementById('glass-diag-semantic');
  if (semHolder) semHolder.style.display = 'none';
  holder.style.display = '';
  wrap.style.display = 'block';

  const url = new URL('glass/' + glassEntry.dxf, window.location.href).href;
  const renderEnts = (ents) => {
    const svg = _buildGlassDxfSvg(ents, axis, panelData);
    if (svg) holder.innerHTML = svg;
    else {
      // DXF 无可用实体 → 退回语义自绘
      holder.innerHTML = _buildSemanticGlassSvg(panelData, axis);
    }
  };
  if (_glassDxfCache[url]) {
    renderEnts(_glassDxfCache[url]);
    return;
  }
  fetch(url, { cache: 'no-store' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.arrayBuffer(); })
    .then(buf => {
      // DXF 文本：HY-055 实测为 UTF-8（DWGCODEPAGE=ANSI_936 头部是误导）。
      // 先尝试 UTF-8（fatal=true 检测失败再回退 GBK），保证中文正确解码
      let text;
      try {
        text = new TextDecoder('utf-8', { fatal: true }).decode(buf);
      } catch (e) {
        try { text = new TextDecoder('gbk', { fatal: false }).decode(buf); }
        catch (e2) { text = new TextDecoder('utf-8', { fatal: false }).decode(buf); }
      }
      const ents = _parseDxfText(text);
      _glassDxfCache[url] = ents;
      renderEnts(ents);
    })
    .catch(err => {
      console.warn('DXF load failed, fallback to semantic:', err);
      holder.innerHTML = _buildSemanticGlassSvg(panelData, axis);
    });
}

/* ===== 语义重建玻璃图（解读 DXF 后用计算尺寸自绘） ===== */
function renderSemanticGlass(wrap, panelData, glassEntry, axis) {
  const titleEl = document.getElementById('glass-diagram-title');
  const canvas = document.getElementById('glass-diag-canvas');
  const frame = document.getElementById('glass-diag-frame');
  if (!frame) { wrap.style.display = 'none'; return; }
  const modelLabel = (glassEntry && glassEntry.modelKey) ? glassEntry.modelKey + '款'
                    : (glassEntry && glassEntry.model ? glassEntry.model : '');
  if (titleEl) {
    const axisText = axis === 'right' ? '右轴' : axis === 'left' ? '左轴' : '未选轴向';
    titleEl.textContent = '玻璃图（' + (modelLabel ? modelLabel + ' · ' : '') + axisText + '）';
  }
  if (canvas) canvas.style.display = 'none';
  let holder = document.getElementById('glass-diag-semantic');
  if (!holder) {
    holder = document.createElement('div');
    holder.id = 'glass-diag-semantic';
    holder.style.cssText = 'width:100%;display:flex;align-items:center;justify-content:center;';
    frame.appendChild(holder);
  }
  holder.style.display = '';
  wrap.style.display = 'block';
  holder.innerHTML = _buildSemanticGlassSvg(panelData, axis);
}

function _buildSemanticGlassSvg(panelData, axis) {
  const byKey = {};
  (panelData || []).forEach((p) => { byKey[p.segment] = p; });
  const L = byKey.l, C = byKey.c, R = byKey.r;
  if (!L || !C || !R) {
    return '<div style="color:#9ca3af;font-size:12px;padding:20px;">玻璃数据不完整</div>';
  }
  const GAP = 218;
  const DOOR_INSET_TOP = 14;   // HY-055: 门玻比固玻顶部下移
  const DOOR_INSET_BOT = 15;   // HY-055: 门玻比固玻底部上移（合计 29 = 47-18）
  const DOOR_INSET_X = 36;
  const HINGE_BOTTOM = 100;
  const HINGE_SPACING = 1000;
  const HINGE_TOP = HINGE_BOTTOM + HINGE_SPACING;
  const HINGE_R = 9;
  const BRACKET_LEN = 60;
  const DIM_GAP_BOTTOM = 110;
  const DIM_GAP_SIDE = 80;
  const LABEL_BELOW = 230;

  const doorAxisOnRight = axis === 'right';
  const H = Math.max(L.glassH, C.glassH, R.glassH);
  const maxH = H;
  const xL = 0;
  const xC = xL + L.glassW + GAP;
  const xR = xC + C.glassW + GAP;
  const totalW = xR + R.glassW;

  const marginL = DIM_GAP_SIDE + 90;
  const marginR = DIM_GAP_SIDE + 90;
  const marginT = 60;
  const marginB = LABEL_BELOW + 80;
  const vbX = -marginL, vbY = -marginT;
  const vbW = totalW + marginL + marginR;
  const vbH = maxH + marginT + marginB;
  const unit = Math.max(vbW, vbH);
  const stroke = unit / 700;
  const dimStroke = unit / 1100;
  const dimFont = unit / 42;
  const labelFont = unit / 42;
  const smallFont = unit / 42;

  const defs = '<defs>' +
    '<style>.t-zh{font-family:"PingFang SC","Microsoft YaHei UI","Microsoft YaHei",sans-serif;}' +
    '.t-num{font-family:"Inter","Segoe UI Variable Display","Segoe UI",system-ui,sans-serif;font-feature-settings:"tnum" 1,"ss01" 1;font-variant-numeric:tabular-nums lining-nums;}' +
    '.t-mix{font-family:"Inter","Segoe UI","PingFang SC","Microsoft YaHei UI",sans-serif;font-feature-settings:"tnum" 1;font-variant-numeric:tabular-nums;}</style>' +
    '<linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#e0f2fe" stop-opacity="0.55"/>' +
      '<stop offset="55%" stop-color="#bae6fd" stop-opacity="0.18"/>' +
      '<stop offset="100%" stop-color="#7dd3fc" stop-opacity="0.10"/>' +
    '</linearGradient>' +
    '<linearGradient id="doorGrad" x1="0" y1="0" x2="0" y2="1">' +
      '<stop offset="0%" stop-color="#fce7f3" stop-opacity="0.55"/>' +
      '<stop offset="55%" stop-color="#fbcfe8" stop-opacity="0.20"/>' +
      '<stop offset="100%" stop-color="#f9a8d4" stop-opacity="0.12"/>' +
    '</linearGradient>' +
    '<filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">' +
      '<feDropShadow dx="0" dy="' + (unit/600) + '" stdDeviation="' + (unit/500) + '" flood-color="#0f172a" flood-opacity="0.18"/>' +
    '</filter>' +
    '<marker id="dimArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="' + (unit/250) + '" markerHeight="' + (unit/250) + '" orient="auto" markerUnits="userSpaceOnUse">' +
      '<path d="M0,0 L10,5 L0,10 z" fill="#1d4ed8"/>' +
    '</marker>' +
    '<marker id="dimArrowStart" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="' + (unit/250) + '" markerHeight="' + (unit/250) + '" orient="auto" markerUnits="userSpaceOnUse">' +
      '<path d="M10,0 L0,5 L10,10 z" fill="#1d4ed8"/>' +
    '</marker>' +
  '</defs>';

  function rect(x, y, w, h, fillId) {
    let s = '';
    s += '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h +
         '" rx="' + (stroke*1.2) + '" ry="' + (stroke*1.2) + '"' +
         ' fill="url(#' + (fillId || 'glassGrad') + ')" stroke="#0f172a" stroke-width="' + stroke +
         '" filter="url(#softShadow)"/>';
    s += '<line x1="' + (x + stroke*4) + '" y1="' + (y + stroke*2) + '" x2="' + (x + w - stroke*4) + '" y2="' + (y + stroke*2) +
         '" stroke="#fff" stroke-opacity="0.55" stroke-width="' + (stroke*0.6) + '"/>';
    return s;
  }

  function panelLabel(x, w, baseY, name, info) {
    let s = '';
    s += '<text class="t-zh" x="' + (x + w/2) + '" y="' + baseY +
         '" font-size="' + labelFont + '" fill="#0f172a"' +
         ' text-anchor="middle" dominant-baseline="alphabetic" font-weight="700"' +
         ' letter-spacing="' + (labelFont*0.06) + '">' + escapeHtml(name) + '</text>';
    s += '<text class="t-num" x="' + (x + w/2) + '" y="' + (baseY + labelFont*1.15) +
         '" font-size="' + labelFont + '" fill="#334155"' +
         ' text-anchor="middle" dominant-baseline="alphabetic" font-weight="500">' +
         info.glassW + ' × ' + info.glassH + '</text>';
    return s;
  }

  function dimWidth(x, w, y, value) {
    let s = '';
    s += '<line x1="' + x + '" y1="' + y + '" x2="' + (x+w) + '" y2="' + y +
         '" stroke="#1d4ed8" stroke-width="' + dimStroke +
         '" marker-start="url(#dimArrowStart)" marker-end="url(#dimArrow)"/>';
    const extLen = unit / 120;
    s += '<line x1="' + x + '" y1="' + (y - extLen) + '" x2="' + x + '" y2="' + (y + extLen*0.4) +
         '" stroke="#94a3b8" stroke-width="' + (dimStroke*0.7) + '"/>';
    s += '<line x1="' + (x+w) + '" y1="' + (y - extLen) + '" x2="' + (x+w) + '" y2="' + (y + extLen*0.4) +
         '" stroke="#94a3b8" stroke-width="' + (dimStroke*0.7) + '"/>';
    s += '<text class="t-num" x="' + (x + w/2) + '" y="' + (y - dimFont*0.45) +
         '" font-size="' + dimFont + '" fill="#1d4ed8"' +
         ' text-anchor="middle" dominant-baseline="alphabetic" font-weight="600">' + value + '</text>';
    return s;
  }

  function dimHeight(x, y, h, value, side) {
    let s = '';
    s += '<line x1="' + x + '" y1="' + y + '" x2="' + x + '" y2="' + (y+h) +
         '" stroke="#1d4ed8" stroke-width="' + dimStroke +
         '" marker-start="url(#dimArrowStart)" marker-end="url(#dimArrow)"/>';
    const extLen = unit / 120;
    const extDir = side === 'right' ? -1 : 1;
    s += '<line x1="' + (x - extLen*extDir) + '" y1="' + y + '" x2="' + (x + extLen*0.4*extDir) + '" y2="' + y +
         '" stroke="#94a3b8" stroke-width="' + (dimStroke*0.7) + '"/>';
    s += '<line x1="' + (x - extLen*extDir) + '" y1="' + (y+h) + '" x2="' + (x + extLen*0.4*extDir) + '" y2="' + (y+h) +
         '" stroke="#94a3b8" stroke-width="' + (dimStroke*0.7) + '"/>';
    const tx = side === 'right' ? x + dimFont*0.45 : x - dimFont*0.45;
    const anchor = side === 'right' ? 'start' : 'end';
    s += '<text class="t-num" x="' + tx + '" y="' + (y + h/2) +
         '" font-size="' + dimFont + '" fill="#1d4ed8"' +
         ' text-anchor="' + anchor + '" dominant-baseline="middle" font-weight="600"' +
         ' transform="rotate(-90, ' + tx + ', ' + (y + h/2) + ')">' + value + '</text>';
    return s;
  }

  function door(x, y, w, h) {
    let s = '';
    s += '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h +
         '" rx="' + (stroke*1.2) + '" ry="' + (stroke*1.2) + '"' +
         ' fill="url(#doorGrad)" stroke="#0f172a" stroke-width="' + stroke +
         '" filter="url(#softShadow)"/>';
    s += '<line x1="' + (x + stroke*4) + '" y1="' + (y + stroke*2) + '" x2="' + (x + w - stroke*4) + '" y2="' + (y + stroke*2) +
         '" stroke="#fff" stroke-opacity="0.55" stroke-width="' + (stroke*0.6) + '"/>';
    const holeX = doorAxisOnRight ? x + DOOR_INSET_X : x + w - DOOR_INSET_X;
    const sideOut = doorAxisOnRight ? -1 : 1;
    const sideIn = -sideOut;
    const doorBot = y + h;
    const holeYBot = doorBot - HINGE_BOTTOM;
    const holeYTop = doorBot - HINGE_TOP;
    [holeYBot, holeYTop].forEach((hy) => {
      const bx1 = holeX + sideIn*12;
      const bx2 = holeX + sideOut*(BRACKET_LEN - DOOR_INSET_X);
      s += '<line x1="' + bx1 + '" y1="' + hy + '" x2="' + bx2 + '" y2="' + hy +
           '" stroke="#dc2626" stroke-width="' + (stroke*0.9) + '"/>';
      s += '<circle cx="' + holeX + '" cy="' + hy + '" r="' + HINGE_R +
           '" fill="#fef2f2" stroke="#dc2626" stroke-width="' + (stroke*0.9) + '"/>';
      s += '<circle cx="' + holeX + '" cy="' + hy + '" r="' + (HINGE_R*0.45) +
           '" fill="#dc2626" fill-opacity="0.85"/>';
    });
    const leadEndX = holeX + sideIn*(HINGE_R + smallFont*0.4);
    s += '<line x1="' + (holeX + sideIn*(HINGE_R+2)) + '" y1="' + holeYTop + '" x2="' + leadEndX + '" y2="' + (holeYTop - smallFont*0.35) +
         '" stroke="#dc2626" stroke-width="' + (dimStroke*0.8) + '"/>';
    s += '<text class="t-mix" x="' + (leadEndX + sideIn*2) + '" y="' + (holeYTop - smallFont*0.55) +
         '" font-size="' + smallFont + '" fill="#dc2626"' +
         ' text-anchor="' + (sideIn > 0 ? 'start' : 'end') + '" dominant-baseline="alphabetic" font-weight="700"' +
         ' paint-order="stroke" stroke="#ffffff" stroke-width="' + (smallFont*0.18) + '" stroke-linejoin="round">2-Φ12</text>';
    s += '<text class="t-num" x="' + (holeX + sideOut*(BRACKET_LEN/2)) + '" y="' + (holeYTop - smallFont*0.35) +
         '" font-size="' + smallFont + '" fill="#1d4ed8"' +
         ' text-anchor="middle" dominant-baseline="alphabetic" font-weight="700"' +
         ' paint-order="stroke" stroke="#ffffff" stroke-width="' + (smallFont*0.18) + '" stroke-linejoin="round">60</text>';
    const dimX = holeX + sideIn*22;
    const tx = dimX + sideIn*(smallFont*0.55);
    s += '<line x1="' + dimX + '" y1="' + holeYTop + '" x2="' + dimX + '" y2="' + holeYBot +
         '" stroke="#1d4ed8" stroke-width="' + dimStroke +
         '" marker-start="url(#dimArrowStart)" marker-end="url(#dimArrow)"/>';
    s += '<text class="t-num" x="' + tx + '" y="' + ((holeYTop+holeYBot)/2) +
         '" font-size="' + smallFont + '" fill="#1d4ed8"' +
         ' text-anchor="middle" dominant-baseline="middle" font-weight="700"' +
         ' paint-order="stroke" stroke="#ffffff" stroke-width="' + (smallFont*0.18) + '" stroke-linejoin="round"' +
         ' transform="rotate(-90, ' + tx + ', ' + ((holeYTop+holeYBot)/2) + ')">' + HINGE_SPACING + '</text>';
    s += '<line x1="' + dimX + '" y1="' + holeYBot + '" x2="' + dimX + '" y2="' + doorBot +
         '" stroke="#1d4ed8" stroke-width="' + dimStroke +
         '" marker-start="url(#dimArrowStart)" marker-end="url(#dimArrow)"/>';
    s += '<text class="t-num" x="' + tx + '" y="' + ((holeYBot+doorBot)/2) +
         '" font-size="' + smallFont + '" fill="#1d4ed8"' +
         ' text-anchor="middle" dominant-baseline="middle" font-weight="700"' +
         ' paint-order="stroke" stroke="#ffffff" stroke-width="' + (smallFont*0.18) + '" stroke-linejoin="round"' +
         ' transform="rotate(-90, ' + tx + ', ' + ((holeYBot+doorBot)/2) + ')">' + HINGE_BOTTOM + '</text>';
    return s;
  }

  let body = '';
  const yL = (maxH - L.glassH) / 2;
  const yR = (maxH - R.glassH) / 2;
  const yC = (maxH - C.glassH) / 2 + DOOR_INSET_TOP;
  const hC = C.glassH - DOOR_INSET_TOP - DOOR_INSET_BOT;
  body += rect(xL, yL, L.glassW, L.glassH, 'glassGrad');
  body += door(xC, yC, C.glassW, hC);
  body += rect(xR, yR, R.glassW, R.glassH, 'glassGrad');

  const dimWY = maxH + DIM_GAP_BOTTOM;
  body += dimWidth(xL, L.glassW, dimWY, L.glassW);
  body += dimWidth(xC, C.glassW, dimWY, C.glassW);
  body += dimWidth(xR, R.glassW, dimWY, R.glassW);
  const labelY = maxH + LABEL_BELOW;
  body += panelLabel(xL, L.glassW, labelY, '固玻', L);
  body += panelLabel(xC, C.glassW, labelY, '门玻', C);
  body += panelLabel(xR, R.glassW, labelY, '固玻', R);

  body += dimHeight(-DIM_GAP_SIDE, yL, L.glassH, L.glassH, 'left');
  body += dimHeight(totalW + DIM_GAP_SIDE, yR, R.glassH, R.glassH, 'right');
  const doorDimX = doorAxisOnRight ? xC + C.glassW + GAP/2 : xC - GAP/2;
  const doorDimSide = doorAxisOnRight ? 'right' : 'left';
  body += dimHeight(doorDimX, yC, hC, C.glassH, doorDimSide);

  return '<svg xmlns="http://www.w3.org/2000/svg" viewBox="' +
         vbX + ' ' + vbY + ' ' + vbW + ' ' + vbH +
         '" preserveAspectRatio="xMidYMid meet"' +
         ' style="width:100%;height:auto;max-height:540px;display:block;background:linear-gradient(180deg,#fafbff 0%,#f1f5f9 100%);border-radius:6px;">' +
         defs + body + '</svg>';
}

function renderGlassResult() {
  const result = window.__lastResult;
  if (!result || !result.geoLengths) return;
  const grid = $("#result-grid");
  const placeholder = $("#glass-placeholder");
  grid.innerHTML = "";

  const totalH = toNumber($("#total-height-input").value, 2000);
  const guides = result.displayGuideValues || result.geoLengths || {};
  const bases = result.displayBaseValues || {};

  // 顶部 3 段尺寸总览
  ["l","c","r"].forEach((seg, idx) => {
    const baseV = bases[seg] || 0;
    const guideV = guides[seg] || 0;
    const cell = document.createElement("div");
    cell.className = "result-cell";
    cell.style.animationDelay = (idx * 40) + "ms";
    cell.innerHTML = `<span class="k">${seg.toUpperCase()} 段（墙体 → 材料）</span>
      <span class="v">${fmt(baseV)} <span style="color:var(--muted-2);font-weight:600">→</span> ${fmt(guideV)}</span>`;
    grid.appendChild(cell);
  });

  const entry = findGlassEntry($("#model-input").value, "diamond");
  if (!entry || !Array.isArray(entry.panels) || !entry.panels.length) {
    placeholder.style.display = "";
    clearGlassDiagram();
    return;
  }
  placeholder.style.display = "none";

  const diagramPanelData = [];
  entry.panels.forEach((panel, idx) => {
    const segVal = toNumber(guides[panel.segment], 0);
    const w = evalFormula(panel.widthFormula, totalH, segVal);
    const h = evalFormula(panel.heightFormula, totalH, segVal);
    const cell = document.createElement("div");
    cell.className = "result-cell glass";
    cell.style.animationDelay = ((idx + 3) * 40) + "ms";
    cell.innerHTML = `<span class="k">${panel.label} ×${panel.count}</span>
      <span class="v">${fmt(w)} × ${fmt(h)}</span>`;
    grid.appendChild(cell);
    if (Number.isFinite(w) && Number.isFinite(h) && w > 0 && h > 0) {
      diagramPanelData.push({
        label: panel.label || panel.segment,
        segment: panel.segment,
        glassW: Math.round(w),
        glassH: Math.round(h),
        widthFormula: panel.widthFormula || '',
        heightFormula: panel.heightFormula || ''
      });
    }
  });
  drawGlassDiagram(diagramPanelData, entry);
}

function bindModeButtons(selector, attrName, onChange) {
  const buttons = $$(selector + " .mode-btn");
  buttons.forEach((btn) => {
    btn.addEventListener("click", () => {
      buttons.forEach((b) => b.classList.remove("active"));
      btn.classList.add("active");
      onChange(btn.dataset[attrName]);
    });
  });
}

function updateInstallExtra() {
  const v = $("#install-type").value;
  const map = {
    sink_top: "#sink-top-outward-group",
    stone_inward: "#stone-inward-group",
    stone_center: "#stone-center-width-group",
  };
  for (const key of Object.keys(map)) {
    const el = document.querySelector(map[key]);
    if (!el) continue;
    const wasHidden = el.style.display === "none";
    if (key === v) {
      el.style.display = "";
      if (wasHidden) {
        el.classList.remove("control-card--enter");
        // force reflow to restart animation
        // eslint-disable-next-line no-unused-expressions
        el.offsetWidth;
        el.classList.add("control-card--enter");
      }
    } else {
      el.style.display = "none";
    }
  }
}

function applyModeUI(mode) {
  $("#input-group-angle").style.display    = mode === "angle"    ? "" : "none";
  $("#input-group-cross").style.display    = mode === "cross"    ? "" : "none";
  $("#input-group-pentagon").style.display = mode === "pentagon" ? "" : "none";
  $("#input-c-wrap").style.display = mode === "pentagon" ? "none" : "";
}

function init() {
  $("#install-type").addEventListener("change", () => {
    updateInstallExtra();
    scheduleDraw();
  });
  updateInstallExtra();

  bindModeButtons("#mode-selector", "mode", (mode) => {
    currentMode = mode;
    applyModeUI(mode);
    scheduleDraw();
  });
  bindModeButtons("#direction-selector", "dir", (dir) => {
    currentDirection = dir;
    scheduleDraw();
  });

  document.addEventListener("input", (e) => {
    if (e.target.matches("input, select")) scheduleDraw();
  });

  // 回车跳到下一可见输入框
  document.addEventListener("keydown", (e) => {
    if (e.key !== "Enter" || e.target.tagName !== "INPUT") return;
    e.preventDefault();
    const inputs = Array.from(document.querySelectorAll('input[type="text"], input[type="number"]'))
      .filter((el) => el.offsetParent !== null && !el.disabled && !el.readOnly);
    const idx = inputs.indexOf(e.target);
    if (idx > -1 && idx < inputs.length - 1) {
      const next = inputs[idx + 1];
      next.focus();
      if (typeof next.select === "function") next.select();
    }
  });

  // 启动时预加载玻璃目录，并在首次 drawDiagram 后自动渲染玻璃区
  loadGlassCatalog().then(() => {
    if (window.__lastResult) renderGlassResult();
  });

  moveCaptureToolbarToActiveHost();
  setupViewSwitcher();
  setupAdvancedSvgInteractions();
  setupCaptureButtons();
  setupReferenceImage();

  scheduleDraw();
}

/* ============================================================
   3D 渲染：玻璃墙体可视化（Three.js）
   ============================================================ */
const three = {
  inited: false,
  active: false,
  renderer: null,
  scene: null,
  camera: null,
  controls: null,
  wallsGroup: null,
  pmrem: null,
  envTex: null,
  raf: 0,
  resizeObs: null,
  signature: "",
};

function setupViewSwitcher() {
  const stage = $("#diagram-stage");
  const switcher = $("#view-switcher");
  if (!stage || !switcher) return;
  const apply = (view) => {
    switcher.dataset.view = view;
    switcher.textContent = view === "3d" ? "3D" : "2D";
    stage.dataset.view = view;
    if (view === "3d") {
      $("#three-hint").hidden = false;
      ensureThreeInited();
      three.active = true;
      syncThreeFromSvg($("#main-svg"), { force: true });
      startThreeLoop();
    } else {
      $("#three-hint").hidden = true;
      three.active = false;
      stopThreeLoop();
    }
  };
  const toggle = () => apply(switcher.dataset.view === "3d" ? "2d" : "3d");
  switcher.addEventListener("click", toggle);
  switcher.addEventListener("keydown", (e) => {
    if (e.key === "Enter" || e.key === " ") { e.preventDefault(); toggle(); }
  });
}

function ensureThreeInited() {
  if (three.inited) return;
  const canvas = $("#three-canvas");
  const stage = $("#diagram-stage");
  if (!canvas || !stage) return;

  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.outputColorSpace = THREE.SRGBColorSpace;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.05;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.setClearColor(0x000000, 0);

  const scene = new THREE.Scene();
  scene.background = null;

  // 渐变天幕（穹顶 sphere），增强环境氛围
  const skyGeo = new THREE.SphereGeometry(8000, 32, 16);
  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    depthWrite: false,
    uniforms: {
      topColor:    { value: new THREE.Color(0xeaf2f8) },
      bottomColor: { value: new THREE.Color(0xfdfaf6) },
    },
    vertexShader: `varying vec3 vWorld; void main(){ vWorld=position; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader: `varying vec3 vWorld; uniform vec3 topColor; uniform vec3 bottomColor; void main(){ float h=normalize(vWorld).y*0.5+0.5; gl_FragColor=vec4(mix(bottomColor,topColor,smoothstep(0.0,1.0,h)),1.0); }`,
  });
  scene.add(new THREE.Mesh(skyGeo, skyMat));

  // 环境光照（PMREM RoomEnvironment 提供高质量反射）
  const pmrem = new THREE.PMREMGenerator(renderer);
  pmrem.compileEquirectangularShader();
  const envTex = pmrem.fromScene(new RoomEnvironment(renderer), 0.04).texture;
  scene.environment = envTex;

  // 主光（半球补光 + 平行光产生阴影）
  scene.add(new THREE.HemisphereLight(0xffffff, 0xb6c4d0, 0.55));
  const sun = new THREE.DirectionalLight(0xffffff, 1.6);
  sun.position.set(2200, 3500, 2400);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.near = 100;
  sun.shadow.camera.far = 9000;
  sun.shadow.camera.left = -3000;
  sun.shadow.camera.right = 3000;
  sun.shadow.camera.top = 3000;
  sun.shadow.camera.bottom = -3000;
  sun.shadow.bias = -0.0005;
  sun.shadow.normalBias = 1.5;
  scene.add(sun);

  // 地面（哑光木纹色 + 接收阴影）
  const floor = new THREE.Mesh(
    new THREE.CircleGeometry(6000, 96),
    new THREE.MeshStandardMaterial({
      color: 0xe6dfd6,
      roughness: 0.78,
      metalness: 0.05,
    })
  );
  floor.rotation.x = -Math.PI / 2;
  floor.receiveShadow = true;
  scene.add(floor);

  // 地面同心圆纹（隐约工程感）
  for (let i = 1; i <= 4; i++) {
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(i * 800 - 4, i * 800 + 4, 96),
      new THREE.MeshBasicMaterial({ color: 0xc8b9a7, transparent: true, opacity: 0.18, side: THREE.DoubleSide })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.5;
    scene.add(ring);
  }

  // 玻璃墙体容器
  const walls = new THREE.Group();
  scene.add(walls);

  const camera = new THREE.PerspectiveCamera(34, 1, 50, 30000);
  // 初始视角：正面、轻微俯视（参考图视角）
  camera.position.set(0, 1500, 4200);
  camera.lookAt(0, 1000, 0);

  const controls = new OrbitControls(camera, canvas);
  controls.enableDamping = true;
  controls.dampingFactor = 0.08;
  controls.target.set(0, 900, 0);
  controls.minDistance = 800;
  controls.maxDistance = 8000;
  controls.maxPolarAngle = Math.PI / 2 - 0.04;

  three.renderer = renderer;
  three.scene = scene;
  three.camera = camera;
  three.controls = controls;
  three.wallsGroup = walls;
  three.pmrem = pmrem;
  three.envTex = envTex;
  three.inited = true;

  // 右键菜单：长按 / 拖动视为相机操作，不弹出菜单
  canvas.addEventListener("contextmenu", handleThreeContextMenu);
  let _rmbDownAt = 0, _rmbDownX = 0, _rmbDownY = 0;
  canvas.addEventListener("mousedown", (e) => {
    if (e.button === 2) { _rmbDownAt = performance.now(); _rmbDownX = e.clientX; _rmbDownY = e.clientY; }
  });
  canvas.addEventListener("mouseup", (e) => {
    if (e.button === 2) {
      const dt = performance.now() - _rmbDownAt;
      const dx = Math.abs(e.clientX - _rmbDownX), dy = Math.abs(e.clientY - _rmbDownY);
      three._suppressCtx = (dt > 250) || (dx + dy > 4);
    }
  });

  resizeThree();
  if ("ResizeObserver" in window) {
    three.resizeObs = new ResizeObserver(() => resizeThree());
    three.resizeObs.observe(stage);
  }
  window.addEventListener("resize", resizeThree);
}

function resizeThree() {
  if (!three.inited) return;
  const stage = $("#diagram-stage");
  const w = stage.clientWidth;
  const h = stage.clientHeight;
  three.renderer.setSize(w, h, false);
  three.camera.aspect = w / Math.max(1, h);
  three.camera.updateProjectionMatrix();
}

function startThreeLoop() {
  if (!three.inited || three.raf) return;
  const tick = () => {
    if (!three.active) { three.raf = 0; return; }
    three.controls.update();
    three.renderer.render(three.scene, three.camera);
    updateThreeLabels();
    three.raf = requestAnimationFrame(tick);
  };
  three.raf = requestAnimationFrame(tick);
}

function stopThreeLoop() {
  if (three.raf) cancelAnimationFrame(three.raf);
  three.raf = 0;
}

// 从 SVG 解析 path.svg-guide 的 4 个材料尺寸点
function extractGuidePoints(svg) {
  const guide = svg.querySelector("path.svg-guide");
  if (!guide) return null;
  const d = guide.getAttribute("d") || "";
  const nums = d.match(/-?\d+(?:\.\d+)?/g);
  if (!nums || nums.length < 8) return null;
  const pts = [];
  for (let i = 0; i + 1 < nums.length; i += 2) {
    pts.push({ x: parseFloat(nums[i]), y: parseFloat(nums[i + 1]) });
  }
  return pts;
}

// 把 SVG 中已渲染的 guide 折线投影成 3D 玻璃墙

/* notch 工具：允许同一固玻同时有 top + bottom 两个缺口 */
function _notchList(notches, label){
  const v = notches && notches[label];
  if (!v) return [];
  const arr = Array.isArray(v) ? v : [v];
  return arr.filter(n => n && n.w > 0 && n.h > 0);
}
function _notchOf(notches, label, side){
  return _notchList(notches, label).find(n => n.side === side) || null;
}
function _setNotch(notches, label, side, val){
  const cur = _notchList(notches, label).filter(n => n.side !== side);
  if (val) cur.push({ ...val, side });
  if (cur.length === 0) delete notches[label];
  else notches[label] = cur;
}

/* ---- 固玻面板几何（支持上下两个外侧角缺口） ---------------- */
function buildPanelGeometry(glassW, innerH, wallT, notches, outerSign) {
  const list = (notches || []).filter(n => n && n.w > 0 && n.h > 0);
  if (list.length === 0 || outerSign === 0) {
    return new THREE.BoxGeometry(glassW, innerH, wallT);
  }
  const hw = glassW / 2, hh = innerH / 2;
  const right = (outerSign > 0);
  const order = ['BL','BR','TR','TL'];
  const cornerPts = { BL:[-hw,-hh], BR:[hw,-hh], TR:[hw,hh], TL:[-hw,hh] };
  const repl = (key, n) => {
    const nw = Math.min(n.w, glassW - 1);
    const nh = Math.min(n.h, innerH - 1);
    switch (key) {
      case 'TL': return [[-hw+nw,hh],[-hw+nw,hh-nh],[-hw,hh-nh]];
      case 'TR': return [[hw,hh-nh],[hw-nw,hh-nh],[hw-nw,hh]];
      case 'BR': return [[hw-nw,-hh],[hw-nw,-hh+nh],[hw,-hh+nh]];
      case 'BL': return [[-hw,-hh+nh],[-hw+nw,-hh+nh],[-hw+nw,-hh]];
    }
  };
  const topNotch = list.find(n => n.side === 'top');
  const botNotch = list.find(n => n.side === 'bottom');
  const topKey = topNotch ? (right ? 'TR' : 'TL') : null;
  const botKey = botNotch ? (right ? 'BR' : 'BL') : null;
  const poly = [];
  for (const k of order) {
    if (k === topKey) poly.push(...repl(k, topNotch));
    else if (k === botKey) poly.push(...repl(k, botNotch));
    else poly.push(cornerPts[k]);
  }
  const shape = new THREE.Shape();
  shape.moveTo(poly[0][0], poly[0][1]);
  for (let i = 1; i < poly.length; i++) shape.lineTo(poly[i][0], poly[i][1]);
  shape.lineTo(poly[0][0], poly[0][1]);
  const geo = new THREE.ExtrudeGeometry(shape, { depth: wallT, bevelEnabled: false, curveSegments: 1, steps: 1 });
  geo.translate(0, 0, -wallT / 2);
  geo.computeVertexNormals();
  return geo;
}

/* 真实多边形轮廓线段（避免 ExtrudeGeometry 三角化产生对角线） */
function buildPanelOutline(glassW, innerH, wallT, notches, outerSign) {
  const hw = glassW / 2, hh = innerH / 2;
  const list = (notches || []).filter(n => n && n.w > 0 && n.h > 0);
  let pts;
  if (list.length === 0 || outerSign === 0) {
    pts = [[-hw,-hh],[hw,-hh],[hw,hh],[-hw,hh]];
  } else {
    const right = (outerSign > 0);
    const order = ['BL','BR','TR','TL'];
    const cornerPts = { BL:[-hw,-hh], BR:[hw,-hh], TR:[hw,hh], TL:[-hw,hh] };
    const repl = (key, n) => {
      const nw = Math.min(n.w, glassW - 1), nh = Math.min(n.h, innerH - 1);
      switch (key) {
        case 'TL': return [[-hw+nw,hh],[-hw+nw,hh-nh],[-hw,hh-nh]];
        case 'TR': return [[hw,hh-nh],[hw-nw,hh-nh],[hw-nw,hh]];
        case 'BR': return [[hw-nw,-hh],[hw-nw,-hh+nh],[hw,-hh+nh]];
        case 'BL': return [[-hw,-hh+nh],[-hw+nw,-hh+nh],[-hw+nw,-hh]];
      }
    };
    const topN = list.find(n=>n.side==='top'), botN = list.find(n=>n.side==='bottom');
    const tk = topN ? (right ? 'TR' : 'TL') : null;
    const bk = botN ? (right ? 'BR' : 'BL') : null;
    pts = [];
    for (const k of order) {
      if (k === tk) pts.push(...repl(k, topN));
      else if (k === bk) pts.push(...repl(k, botN));
      else pts.push(cornerPts[k]);
    }
  }
  const positions = [];
  const z1 = -wallT / 2, z2 = wallT / 2;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    positions.push(a[0], a[1], z1,  b[0], b[1], z1);
    positions.push(a[0], a[1], z2,  b[0], b[1], z2);
    positions.push(a[0], a[1], z1,  a[0], a[1], z2);
  }
  const g = new THREE.BufferGeometry();
  g.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  return new THREE.LineSegments(g, new THREE.LineBasicMaterial({
    color: 0x0f172a, transparent: true, opacity: 0.85,
  }));
}

/* ---- 3D 右键菜单：固玻添加/修改/删除缺口 ---------------------- */
function showThreeNotchDialog({ title, w, h }) {
  return new Promise(resolve => {
    const dlg  = document.getElementById('three-notch-dlg');
    const mask = document.getElementById('three-notch-mask');
    const tt   = document.getElementById('three-notch-title');
    const iw   = document.getElementById('three-notch-w');
    const ih   = document.getElementById('three-notch-h');
    const ok   = document.getElementById('three-notch-ok');
    const ca   = document.getElementById('three-notch-cancel');
    tt.textContent = title || '缺口尺寸';
    iw.value = (w != null ? w : '');
    ih.value = (h != null ? h : '');
    dlg.hidden = false; mask.hidden = false;
    setTimeout(() => iw.focus(), 30);
    function close(val){
      dlg.hidden = true; mask.hidden = true;
      ok.removeEventListener('click', onOk);
      ca.removeEventListener('click', onCancel);
      mask.removeEventListener('click', onCancel);
      iw.removeEventListener('keydown', onKey);
      ih.removeEventListener('keydown', onKey);
      resolve(val);
    }
    function onOk(){
      const wv = parseFloat(iw.value), hv = parseFloat(ih.value);
      if (!(wv > 0) || !(hv > 0)) { alert('请输入有效的宽和高（mm）'); return; }
      close({ w: wv, h: hv });
    }
    function onCancel(){ close(null); }
    function onKey(e){
      if (e.key === 'Enter') onOk();
      else if (e.key === 'Escape') onCancel();
    }
    ok.addEventListener('click', onOk);
    ca.addEventListener('click', onCancel);
    mask.addEventListener('click', onCancel);
    iw.addEventListener('keydown', onKey);
    ih.addEventListener('keydown', onKey);
  });
}

function showThreeCtxMenu(clientX, clientY, hasNotch, onPick){
  const menu = document.getElementById('three-ctx-menu');
  menu.querySelector('[data-act="add"]').hidden = !!hasNotch;
  menu.querySelector('[data-act="edit"]').hidden = !hasNotch;
  menu.querySelector('[data-act="del"]').hidden  = !hasNotch;
  menu.style.left = clientX + 'px';
  menu.style.top  = clientY + 'px';
  menu.hidden = false;
  function onClick(e){
    const b = e.target.closest('button[data-act]');
    if (!b) return;
    hide();
    onPick(b.dataset.act);
  }
  function onDocDown(e){
    if (!menu.contains(e.target)) hide();
  }
  function hide(){
    menu.hidden = true;
    menu.removeEventListener('click', onClick);
    document.removeEventListener('mousedown', onDocDown, true);
  }
  menu.addEventListener('click', onClick);
  setTimeout(()=>document.addEventListener('mousedown', onDocDown, true), 0);
}

function handleThreeContextMenu(event) {
  if (!three.inited || !three.active) return;
  if (three._suppressCtx) {
    three._suppressCtx = false;
    event.preventDefault();
    return;
  }
  const canvas = event.currentTarget;
  const rect = canvas.getBoundingClientRect();
  const nx = ((event.clientX - rect.left) / rect.width) * 2 - 1;
  const ny = -((event.clientY - rect.top) / rect.height) * 2 + 1;
  const ray = new THREE.Raycaster();
  ray.setFromCamera({ x: nx, y: ny }, three.camera);
  const hits = ray.intersectObjects(three.wallsGroup.children, true);
  let hit = null;
  for (const h of hits) {
    if (h.object && h.object.userData && h.object.userData.isFixedPanel) { hit = h; break; }
  }
  if (!hit) return;
  event.preventDefault();
  const ud = hit.object.userData;
  const side = (hit.point.y > ud.glassCY) ? 'top' : 'bottom';
  three.notches = three.notches || {};
  const cur = _notchOf(three.notches, ud.segLabel, side);
  const segZh = ud.segLabel === 'L' ? '左固玻' : (ud.segLabel === 'R' ? '右固玻' : ud.segLabel);
  const sideZh = side === 'top' ? '上半' : '下半';

  showThreeCtxMenu(event.clientX, event.clientY, !!cur, async (act) => {
    if (act === 'del') {
      _setNotch(three.notches, ud.segLabel, side, null);
      three.signature = '';
      syncThreeFromSvg($("#main-svg"), { force: true });
      updateThreeLabels();
      return;
    }
    const isEdit = act === 'edit';
    const ret = await showThreeNotchDialog({
      title: (isEdit ? '修改' : '添加') + segZh + sideZh + '缺口',
      w: cur ? cur.w : 100,
      h: cur ? cur.h : 200,
    });
    if (!ret) return;
    _setNotch(three.notches, ud.segLabel, side, { w: ret.w, h: ret.h });
    three.signature = '';
    syncThreeFromSvg($("#main-svg"), { force: true });
    updateThreeLabels();
  });
}

function syncThreeFromSvg(svg, opts = {}) {
  if (!three.inited || (!three.active && !opts.force)) return;
  const pts2d = extractGuidePoints(svg);
  const totalH = Math.max(600, toNumber($("#total-height-input")?.value, 2000));
  const dirSig = (window.__lastPayload && window.__lastPayload.currentDirection) || "left";
  const sig = JSON.stringify({ pts2d, totalH, dirSig, notches: three.notches || {} });
  if (sig === three.signature && !opts.force) return;
  three.signature = sig;

  // 清空旧墙体
  three.wallsGroup.clear();
  if (!pts2d || pts2d.length < 2) return;

  // —— 真实毫米校准 ——
  // SVG 中 guide 折线段的像素长度 vs result.geoLengths（实际 mm 长度）反推比例
  const segPx = [];
  for (let i = 0; i + 1 < pts2d.length; i++) {
    const dx = pts2d[i + 1].x - pts2d[i].x;
    const dy = pts2d[i + 1].y - pts2d[i].y;
    segPx.push(Math.hypot(dx, dy));
  }
  const geo = (window.__lastResult && window.__lastResult.geoLengths) || null;
  const segMM = geo ? [geo.l || 0, geo.c || 0, geo.r || 0] : [];
  let mmPerPx = 0, denom = 0;
  for (let i = 0; i < segPx.length; i++) {
    const mm = segMM[i] || 0;
    if (mm > 0 && segPx[i] > 0.5) { mmPerPx += mm / segPx[i]; denom++; }
  }
  // 若取不到比例（无型号输入或几何为 0），回退到把最长边映射到 2400mm
  if (denom > 0) {
    mmPerPx = mmPerPx / denom;
  } else {
    const xs = pts2d.map((p) => p.x), ys = pts2d.map((p) => p.y);
    const span = Math.max(Math.max(...xs) - Math.min(...xs), Math.max(...ys) - Math.min(...ys)) || 1;
    mmPerPx = 2400 / span;
  }

  // 居中：以 SVG 坐标包围盒中心为原点；y 翻转（SVG 向下 → three z 向前）
  const xs2 = pts2d.map((p) => p.x), ys2 = pts2d.map((p) => p.y);
  const cx = (Math.min(...xs2) + Math.max(...xs2)) / 2;
  const cy = (Math.min(...ys2) + Math.max(...ys2)) / 2;
  const pts3d = pts2d.map((p) => new THREE.Vector3((p.x - cx) * mmPerPx, 0, (p.y - cy) * mmPerPx));

  // 真实毫米尺度下的墙厚（10mm 玻璃）和墙高（用户输入）
  const wallH = totalH;
  const wallT = 10;

  // 缓存段数据用于 3D label 叠加 + 截图
  const segLabels = ["L", "C", "R"];
  three.notches = three.notches || {};
  const notches = three.notches;
  three.segData = [];
  for (let i = 0; i + 1 < pts3d.length; i++) {
    const a = pts3d[i], b = pts3d[i + 1];
    const midTop = new THREE.Vector3((a.x + b.x) / 2, wallH, (a.z + b.z) / 2);
    const midBot = new THREE.Vector3((a.x + b.x) / 2, 12, (a.z + b.z) / 2);
    const baseMM = (segMM[i] || 0);
    const label  = segLabels[i] || `S${i+1}`;
    const nlist  = _notchList(notches, label);
    const topN   = nlist.find(n => n.side === 'top');
    const botN   = nlist.find(n => n.side === 'bottom');
    if (topN || botN) {
      const topMM = topN ? Math.max(0, baseMM - topN.w) : baseMM;
      const botMM = botN ? Math.max(0, baseMM - botN.w) : baseMM;
      three.segData.push({ mid: midTop, mm: topMM, label });
      three.segData.push({ mid: midBot, mm: botMM, label });
    } else {
      three.segData.push({ mid: midTop, mm: baseMM, label });
    }
  }

  const glassMat = new THREE.MeshPhysicalMaterial({
    color: 0xcfe1eb,
    metalness: 0,
    roughness: 0.04,
    transmission: 0.92,
    thickness: 12,
    ior: 1.45,
    transparent: true,
    opacity: 0.55,
    clearcoat: 1,
    clearcoatRoughness: 0.05,
    side: THREE.DoubleSide,
    envMapIntensity: 1.1,
  });
  const edgeMat = new THREE.LineBasicMaterial({ color: 0x1f2a37, transparent: true, opacity: 0.55 });
  const frameMat = new THREE.MeshStandardMaterial({ color: 0x1c1714, roughness: 0.45, metalness: 0.6 });
  const handleMat = new THREE.MeshStandardMaterial({ color: 0x2a2a2a, roughness: 0.28, metalness: 0.85 });

  // —— 全包框 + 门扇参数（mm，按客户工艺规范）——
  const TOP_BAR_FACE  = 17;  // 上弓看面
  const BOT_BAR_FACE  = 12;  // 下弓看面
  const SIDE_END_FACE = 15;  // 左右边料看面（最外侧端柱单边）
  const MID_POST_HALF = 12;  // 中柱单边看面（→ 直径 24）
  const FRAME_D = 30;        // 边框厚（垂直玻璃面方向）
  const DOOR_TB_FACE     = 12; // 门扇上下包看面
  const DOOR_HANDLE_SIDE = 12; // 门扇拉手侧竖包看面
  const DOOR_HINGE_SIDE  = 18; // 门扇转轴侧竖包看面
  const DOOR_FD = 26;          // 门扇框厚
  const DOOR_GAP = 6;          // 门扇与门框间隙
  const HANDLE_LEN = 1000;     // 1m 拉手
  const HANDLE_DIA = 22;
  const HANDLE_BOTTOM_FROM_GROUND = 100; // 拉手底端离地高
  const HANDLE_OFFSET_FROM_EDGE = 80;    // 拉手距开启侧门扇内边
  const HANDLE_STAND_OFF = 38;           // 拉手离玻璃面距离

  // 找门扇：奇数段时取最中间一段；其余情况无门扇
  const segCount = pts3d.length - 1;
